<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    :root{--bg1:#eaf6ff;--bg2:#f7fffb;--accent:#1f9d55;--accent2:#0ea5e9;--text:#0b2545;--muted:#5c6b7a;--card:#ffffffcc;--line:#d7e7f5;--danger:#ff5a5f;}
    *{box-sizing:border-box;}
    body{
      margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      color:var(--text);
      background:radial-gradient(1100px 600px at 18% 0%,var(--bg1),transparent),
        radial-gradient(1100px 600px at 92% 20%,var(--bg2),transparent),
        linear-gradient(180deg,#ffffff,#f3fbff);
      display:flex;flex-direction:column;min-height:100vh;
    }
    header{
      padding:14px 22px;display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--line);backdrop-filter:blur(8px);
      background:rgba(255,255,255,.55);
    }
    .title{font-weight:900;letter-spacing:.06em;font-size:16px;}
    .content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
    .sign-card{
      background:var(--card);border:1px solid var(--line);border-radius:18px;
      padding:24px;max-width:500px;width:100%;text-align:center;
      box-shadow:0 10px 30px rgba(10,40,80,.06);
    }
    .sign-card h2{margin:0 0 4px;font-weight:900;}
    .sign-card .sub{color:var(--muted);font-size:13px;margin-bottom:16px;}

    /* 承認者選択 */
    .approver-section{margin-bottom:18px;text-align:left;}
    .approver-section label{font-weight:700;font-size:13px;display:block;margin-bottom:6px;}
    .approver-select{
      width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--line);
      font-size:14px;background:#fff;color:var(--text);
    }
    .stamp-badge{
      display:inline-block;margin-top:6px;padding:3px 10px;border-radius:8px;
      font-size:12px;font-weight:700;
    }
    .stamp-badge.has-stamp{background:#e6ffed;color:#1f9d55;}
    .stamp-badge.no-stamp{background:#fff5f5;color:#ff5a5f;}

    /* サインエリア */
    .sign-area{margin-top:12px;}
    .sign-area-label{font-size:13px;color:var(--text);margin-bottom:10px;font-weight:700;}
    canvas{
      border:2px solid var(--accent2);border-radius:12px;background:#fff;
      cursor:crosshair;touch-action:none;display:block;margin:0 auto;
      width:100%;height:260px;
    }
    .actions{display:flex;gap:10px;justify-content:center;margin-top:16px;}
    button{
      padding:12px 24px;border-radius:12px;border:0;font-weight:800;
      cursor:pointer;font-size:14px;
    }
    .btn-approve{
      background:linear-gradient(135deg,var(--accent),#1bd67f);
      color:#fff;box-shadow:0 10px 22px rgba(31,157,85,.20);
    }
    .btn-clear{background:#fff;color:var(--text);border:1px solid var(--line);}
    .btn-back{background:#fff;color:var(--text);border:1px solid var(--line);}
    .btn-approve:disabled{opacity:.5;cursor:not-allowed;}
    .status-msg{margin-top:12px;font-size:14px;font-weight:700;}
    .status-msg.error{color:var(--danger);}
    .status-msg.success{color:var(--accent);}
  </style>
</head>
<body>
  <header>
    <div class="title">休暇届 承認</div>
  </header>

  <div class="content">
    <div class="sign-card">
      <h2>承認処理</h2>

      <!-- 承認者選択 -->
      <div class="approver-section">
        <label>承認者を選択してください</label>
        <select class="approver-select" id="approverSelect" onchange="onApproverChange()">
          <option value="">読み込み中...</option>
        </select>
        <div id="stampStatus"></div>
      </div>

      <!-- サインエリア（電子印がない場合のみ表示） -->
      <div class="sign-area" id="signArea" style="display:none;">
        <div class="sign-area-label">電子印が未登録のため、下の枠内にサインを書いてください</div>
        <canvas id="signCanvas"></canvas>
        <div style="text-align:center;margin-top:8px;">
          <button class="btn-clear" onclick="clearCanvas()">クリア</button>
        </div>
      </div>

      <div class="actions">
        <button class="btn-back" onclick="goBack()">戻る</button>
        <button class="btn-approve" id="approveBtn" onclick="doApprove()" disabled>承認する</button>
      </div>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>

<script>
var REQ_ID = '<?= REQ_ID ?>';
var APP_URL = '<?= APP_URL ?>';

var approverList = [];
var selectedApprover = null;
var hasStamp = false;

// ====== Canvas setup ======
var canvas = document.getElementById('signCanvas');
var ctx = canvas.getContext('2d');
var drawing = false;
var hasDrawn = false;

function resizeCanvas() {
  var rect = canvas.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.strokeStyle = '#0b2545';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

canvas.addEventListener('pointerdown', function(e) {
  drawing = true; hasDrawn = true;
  var rect = canvas.getBoundingClientRect();
  ctx.beginPath();
  ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
  e.preventDefault();
});
canvas.addEventListener('pointermove', function(e) {
  if (!drawing) return;
  var rect = canvas.getBoundingClientRect();
  ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
  ctx.stroke();
  e.preventDefault();
});
canvas.addEventListener('pointerup', function(e) { drawing = false; e.preventDefault(); });
canvas.addEventListener('pointerleave', function() { drawing = false; });

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasDrawn = false;
}

// ====== 承認者一覧を読み込み ======
window.addEventListener('resize', function() { resizeCanvas(); clearCanvas(); });

window.addEventListener('DOMContentLoaded', function() {
  resizeCanvas();

  google.script.run
    .withSuccessHandler(function(list) {
      approverList = list || [];
      var sel = document.getElementById('approverSelect');
      sel.innerHTML = '<option value="">-- 承認者を選択 --</option>';
      // 手書きサインの選択肢を先頭に追加
      var handOpt = document.createElement('option');
      handOpt.value = '__handwrite__';
      handOpt.textContent = '✍ 手書きサイン（電子印なし）';
      sel.appendChild(handOpt);
      // 電子印登録者を追加
      for (var i = 0; i < approverList.length; i++) {
        var opt = document.createElement('option');
        opt.value = approverList[i].email;
        opt.textContent = approverList[i].name + '（' + approverList[i].email + '）';
        sel.appendChild(opt);
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('approverSelect').innerHTML =
        '<option value="">取得エラー: ' + err.message + '</option>';
    })
    .api_getApproverList();
});

// ====== 承認者変更時 ======
function onApproverChange() {
  var sel = document.getElementById('approverSelect');
  var email = sel.value;
  var statusEl = document.getElementById('stampStatus');
  var signArea = document.getElementById('signArea');
  var btn = document.getElementById('approveBtn');

  if (!email) {
    statusEl.innerHTML = '';
    signArea.style.display = 'none';
    btn.disabled = true;
    selectedApprover = null;
    hasStamp = false;
    return;
  }

  if (email === '__handwrite__') {
    // 手書きサイン選択
    selectedApprover = '';
    hasStamp = false;
    statusEl.innerHTML = '<span class="stamp-badge no-stamp">手書きサイン</span>';
    signArea.style.display = 'block';
    document.querySelector('.sign-area-label').textContent = '下の枠内にサインを書いてください';
    btn.disabled = false;
    clearCanvas();
    return;
  }

  selectedApprover = email;
  // StampMapに登録されている = 電子印あり
  hasStamp = true;
  statusEl.innerHTML = '<span class="stamp-badge has-stamp">電子印あり</span>';
  signArea.style.display = 'none';
  btn.disabled = false;
}

// ====== 承認実行 ======
function goBack() {
  window.top.location.href = APP_URL + '?page=preview&reqId=' + REQ_ID;
}

function doApprove() {
  var selVal = document.getElementById('approverSelect').value;
  if (!selVal) {
    alert('承認者を選択してください。');
    return;
  }
  if (!hasStamp && !hasDrawn) {
    alert('サインを書いてください。');
    return;
  }
  if (!confirm('承認してよろしいですか？')) return;

  var btn = document.getElementById('approveBtn');
  btn.disabled = true;
  btn.textContent = '処理中...';
  var msg = document.getElementById('statusMsg');
  msg.textContent = '承認処理中... しばらくお待ちください。';
  msg.className = 'status-msg';

  // サインBase64（電子印がない場合のみ）
  var signBase64 = '';
  if (!hasStamp && hasDrawn) {
    signBase64 = canvas.toDataURL('image/png');
  }

  console.log('承認実行: reqId=' + REQ_ID + ', approverEmail=' + selectedApprover + ', hasStamp=' + hasStamp + ', signBase64.length=' + signBase64.length);

  google.script.run
    .withSuccessHandler(function(result) {
      console.log('approve result:', result);
      if (result && result.ok) {
        msg.className = 'status-msg success';
        btn.style.display = 'none';
        document.querySelector('.btn-back').style.display = 'none';
        var previewUrl = APP_URL + '?page=preview&reqId=' + REQ_ID + '&approved=1';
        var meta = document.createElement('meta');
        meta.httpEquiv = 'refresh';
        meta.content = '1;url=' + previewUrl;
        document.head.appendChild(meta);
        msg.innerHTML = '承認が完了しました。<br>承認済プレビューを表示します...<br>'
          + '<a href="' + previewUrl + '" target="_top" style="font-size:13px;color:#0ea5e9;">自動で切り替わらない場合はこちら</a>';
      } else {
        msg.textContent = '承認に失敗しました。';
        msg.className = 'status-msg error';
        btn.disabled = false;
        btn.textContent = '承認する';
      }
    })
    .withFailureHandler(function(err) {
      console.error('approve error:', err);
      msg.textContent = 'エラー: ' + err.message;
      msg.className = 'status-msg error';
      btn.disabled = false;
      btn.textContent = '承認する';
    })
    .api_approveLeaveRequest(REQ_ID, signBase64, selectedApprover);
}
</script>
</body>
</html>
