<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    :root{--bg1:#eaf6ff;--bg2:#f7fffb;--accent:#1f9d55;--accent2:#0ea5e9;--text:#0b2545;--muted:#5c6b7a;--card:#ffffffcc;--line:#d7e7f5;--danger:#ff5a5f;}
    *{box-sizing:border-box;}
    body{
      margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      color:var(--text);
      background:radial-gradient(1100px 600px at 18% 0%,var(--bg1),transparent),
        radial-gradient(1100px 600px at 92% 20%,var(--bg2),transparent),
        linear-gradient(180deg,#ffffff,#f3fbff);
      display:flex;flex-direction:column;min-height:100vh;
    }
    header{
      padding:14px 22px;display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--line);backdrop-filter:blur(8px);
      background:rgba(255,255,255,.55);
    }
    .title{font-weight:900;letter-spacing:.06em;font-size:16px;}
    .content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
    .sign-card{
      background:var(--card);border:1px solid var(--line);border-radius:18px;
      padding:24px;max-width:500px;width:100%;text-align:center;
      box-shadow:0 10px 30px rgba(10,40,80,.06);
    }
    .sign-card h2{margin:0 0 4px;font-weight:900;}
    .sign-card .sub{color:var(--muted);font-size:13px;margin-bottom:16px;}
    canvas{
      border:2px solid var(--line);border-radius:12px;background:#fff;
      cursor:crosshair;touch-action:none;display:block;margin:0 auto;
    }
    .actions{display:flex;gap:10px;justify-content:center;margin-top:16px;}
    button{
      padding:12px 24px;border-radius:12px;border:0;font-weight:800;
      cursor:pointer;font-size:14px;
    }
    .btn-approve{
      background:linear-gradient(135deg,var(--accent),#1bd67f);
      color:#fff;box-shadow:0 10px 22px rgba(31,157,85,.20);
    }
    .btn-clear{background:#fff;color:var(--text);border:1px solid var(--line);}
    .btn-back{background:#fff;color:var(--text);border:1px solid var(--line);}
    .btn-approve:disabled{opacity:.5;cursor:not-allowed;}
    .status-msg{margin-top:12px;font-size:14px;font-weight:700;}
    .status-msg.error{color:var(--danger);}
    .status-msg.success{color:var(--accent);}
  </style>
</head>
<body>
  <header>
    <div class="title">休暇届 承認サイン</div>
  </header>

  <div class="content">
    <div class="sign-card">
      <h2>承認サイン</h2>
      <div class="sub">下の枠内にサインを書いてください（タッチ・ペン対応）</div>
      <canvas id="signCanvas" width="400" height="200"></canvas>
      <div class="actions">
        <button class="btn-back" onclick="goBack()">戻る</button>
        <button class="btn-clear" onclick="clearCanvas()">クリア</button>
        <button class="btn-approve" id="approveBtn" onclick="doApprove()">承認する</button>
      </div>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>

<script>
var REQ_ID = '<?= REQ_ID ?>';
var APP_URL = '<?= APP_URL ?>';

var canvas = document.getElementById('signCanvas');
var ctx = canvas.getContext('2d');
var drawing = false;
var hasDrawn = false;

// Resize canvas for high DPI
function resizeCanvas() {
  var rect = canvas.getBoundingClientRect();
  var dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#0b2545';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

window.addEventListener('DOMContentLoaded', function() {
  resizeCanvas();
});

// Pointer events (unified touch/mouse/pen)
canvas.addEventListener('pointerdown', function(e) {
  drawing = true;
  hasDrawn = true;
  var rect = canvas.getBoundingClientRect();
  ctx.beginPath();
  ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
  e.preventDefault();
});

canvas.addEventListener('pointermove', function(e) {
  if (!drawing) return;
  var rect = canvas.getBoundingClientRect();
  ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
  ctx.stroke();
  e.preventDefault();
});

canvas.addEventListener('pointerup', function(e) {
  drawing = false;
  e.preventDefault();
});

canvas.addEventListener('pointerleave', function(e) {
  drawing = false;
});

function clearCanvas() {
  var rect = canvas.getBoundingClientRect();
  ctx.clearRect(0, 0, rect.width, rect.height);
  hasDrawn = false;
}

function goBack() {
  window.top.location.href = APP_URL + '?page=preview&reqId=' + REQ_ID;
}

function doApprove() {
  if (!hasDrawn) {
    alert('サインを書いてください。');
    return;
  }
  if (!confirm('承認してよろしいですか？')) return;

  var btn = document.getElementById('approveBtn');
  btn.disabled = true;
  btn.textContent = '処理中...';
  var msg = document.getElementById('statusMsg');
  msg.textContent = '承認処理中... しばらくお待ちください。';
  msg.className = 'status-msg';

  // canvas → Base64 PNG
  var signBase64 = canvas.toDataURL('image/png');

  google.script.run
    .withSuccessHandler(function(result) {
      console.log('approve result:', result, 'APP_URL=[' + APP_URL + ']');
      if (result && result.ok) {
        msg.className = 'status-msg success';
        btn.style.display = 'none';
        document.querySelector('.btn-clear').style.display = 'none';
        document.querySelector('.btn-back').style.display = 'none';
        var topUrl = APP_URL + '?page=top';
        // meta refreshで自動遷移（GASサンドボックス回避）
        var meta = document.createElement('meta');
        meta.httpEquiv = 'refresh';
        meta.content = '2;url=' + topUrl;
        document.head.appendChild(meta);
        msg.innerHTML = '承認が完了しました。<br>2秒後にTOPページへ戻ります...<br><a href="' + topUrl + '" target="_top" style="font-size:13px;color:#0ea5e9;">自動で切り替わらない場合はこちら</a>';
      } else {
        msg.textContent = '承認に失敗しました。';
        msg.className = 'status-msg error';
        btn.disabled = false;
        btn.textContent = '承認する';
      }
    })
    .withFailureHandler(function(err) {
      console.error('approve error:', err);
      msg.textContent = 'エラー: ' + err.message;
      msg.className = 'status-msg error';
      btn.disabled = false;
      btn.textContent = '承認する';
    })
    .api_approveLeaveRequest(REQ_ID, signBase64);
}
</script>
</body>
</html>
