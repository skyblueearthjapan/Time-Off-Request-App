<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{--bg1:#eaf6ff;--bg2:#f7fffb;--accent:#1f9d55;--accent2:#0ea5e9;--text:#0b2545;--muted:#5c6b7a;--card:#ffffffcc;--line:#d7e7f5;--danger:#ff5a5f;--warn:#ffb020;}
    *{box-sizing:border-box;}
    body{
      margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      color:var(--text);
      background:radial-gradient(1100px 600px at 18% 0%,var(--bg1),transparent),
        radial-gradient(1100px 600px at 92% 20%,var(--bg2),transparent),
        linear-gradient(180deg,#ffffff,#f3fbff);
    }
    header{
      padding:18px 22px;display:flex;align-items:flex-end;justify-content:space-between;
      border-bottom:1px solid var(--line);backdrop-filter:blur(8px);
      position:sticky;top:0;background:rgba(255,255,255,.55);z-index:10;
    }
    .title{font-weight:900;letter-spacing:.06em;font-size:18px;}
    .sub{opacity:.8;font-size:12px;color:var(--muted);}
    .wrap{padding:18px 22px;max-width:1200px;margin:0 auto;}
    .card{
      background:var(--card);border:1px solid var(--line);border-radius:18px;
      padding:14px 18px;box-shadow:0 10px 30px rgba(10,40,80,.06);margin-bottom:14px;
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
    button{
      padding:10px 16px;border-radius:12px;border:0;
      background:linear-gradient(135deg,var(--accent),#1bd67f);
      color:#fff;font-weight:800;cursor:pointer;font-size:14px;
      box-shadow:0 10px 22px rgba(31,157,85,.20);
    }
    .btn-blue{background:linear-gradient(135deg,var(--accent2),#38bdf8);box-shadow:0 10px 22px rgba(14,165,233,.20);}
    .btn-sm{padding:6px 10px;font-size:12px;border-radius:8px;}
    .ghost{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none;}
    .pill{padding:4px 10px;border-radius:999px;font-size:12px;border:1px solid var(--line);background:#fff;display:inline-block;white-space:nowrap;}
    .danger{border-color:#ffb3b3;background:#fff0f0;color:#7a0b0b;}
    .warn{border-color:#ffd29e;background:#fff6eb;color:#7a4a0b;}
    .caution{border-color:#ffe08a;background:#fffbe6;color:#7a5e0b;}
    .ok{border-color:#bfe9d0;background:#f0fff6;color:#0b5a2b;}
    .info{border-color:#b3d4ff;background:#f0f7ff;color:#0b2a5a;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th,td{border-bottom:1px solid var(--line);padding:10px 8px;text-align:left;}
    th{font-size:12px;color:var(--muted);white-space:nowrap;}
    tr.danger-row{background:#fff0f0;}
    tr.warn-row{background:#fff8ee;}
    tr.caution-row{background:#fffbe6;}
    a{color:var(--accent2);text-decoration:none;}
    a:hover{text-decoration:underline;}
    .nav-link{font-size:13px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--text);}
    .nav-link:hover{background:var(--bg1);text-decoration:none;}
    .portal-link{
      font-size:13px;padding:6px 14px;border-radius:8px;
      background:linear-gradient(135deg,var(--accent),#1bd67f);
      color:#fff;font-weight:700;text-decoration:none;
    }
    .portal-link:hover{opacity:.9;text-decoration:none;}
    .loading{text-align:center;padding:30px;color:var(--muted);}
    select{padding:8px 14px;border-radius:999px;border:1px solid var(--line);font-size:14px;font-weight:700;min-width:160px;}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
    .kpi-card{
      background:var(--card);border:1px solid var(--line);border-radius:14px;
      padding:14px;text-align:center;
    }
    .kpi-label{font-size:12px;color:var(--muted);margin-bottom:4px;}
    .kpi-value{font-size:24px;font-weight:900;}
    .kpi-value.danger{color:var(--danger);}
    .kpi-value.warn{color:var(--warn);}
    .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
    td.qcell{text-align:center;}

    /* 承認者選択モーダル */
    .modal-overlay{
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,.35);z-index:100;
      display:flex;align-items:center;justify-content:center;
    }
    .modal-overlay.hidden{display:none;}
    .modal-box{
      background:#fff;border-radius:20px;padding:28px 24px;
      max-width:480px;width:90%;max-height:80vh;overflow-y:auto;
      box-shadow:0 20px 60px rgba(0,0,0,.15);
    }
    .modal-box h3{margin:0 0 6px;font-weight:900;font-size:18px;}
    .modal-box .modal-sub{color:var(--muted);font-size:13px;margin-bottom:18px;}
    .approver-btn{
      display:block;width:100%;text-align:left;padding:14px 16px;
      margin-bottom:8px;border-radius:14px;border:1px solid var(--line);
      background:#fff;color:var(--text);cursor:pointer;font-size:14px;
      font-weight:700;box-shadow:none;transition:background .15s;
    }
    .approver-btn:hover{background:var(--bg1);}
    .approver-btn .dept-list{font-size:12px;color:var(--muted);font-weight:400;margin-top:2px;}
    .approver-btn.all-dept{
      background:linear-gradient(135deg,var(--accent2),#38bdf8);
      color:#fff;border-color:transparent;text-align:center;
    }
    .approver-btn.all-dept:hover{opacity:.9;}
    .approver-btn.all-dept .dept-list{color:rgba(255,255,255,.7);}

    @media(max-width:640px){
      header{flex-direction:column;align-items:flex-start;gap:8px;}
      .wrap{padding:12px 10px;}
      .kpi-grid{grid-template-columns:1fr 1fr;}
      table{font-size:12px;}
      th,td{padding:8px 4px;}
      select{min-width:auto;width:100%;}
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="title">部署管理ダッシュボード</div>
      <div class="sub" id="headerSub">読込中...</div>
    </div>
    <div class="row">
      <a href="<?= APP_URL ?>?page=top" target="_top" class="nav-link">申請TOP</a>
      <button class="ghost btn-sm" id="btnChangeApprover" onclick="showApproverModal()" style="display:none;">承認者変更</button>
      <a href="<?= APP_URL ?>?page=somuAdmin" target="_top" class="nav-link" id="navSomu" style="display:none;">総務管理</a>
      <a href="<?= PORTAL_URL ?>" target="_top" class="portal-link" id="portalLink" style="display:none;">社内ポータルへ移動</a>
    </div>
  </header>

  <!-- 承認者選択モーダル -->
  <div class="modal-overlay hidden" id="approverModal">
    <div class="modal-box">
      <h3>承認者を選択</h3>
      <div class="modal-sub">表示する承認者の部署を選んでください</div>
      <div id="approverList"></div>
      <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--line);">
        <a href="<?= APP_URL ?>?page=top" target="_top" style="display:inline-block;padding:8px 20px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--text);font-size:13px;font-weight:700;text-decoration:none;">申請TOPへ戻る</a>
      </div>
    </div>
  </div>

  <div class="wrap">
    <!-- フィルタ -->
    <div class="card" style="padding:12px 16px;">
      <div class="row">
        <div>
          <label style="font-weight:700;font-size:13px;">年度：</label>
          <select id="fySelect"></select>
        </div>
        <button class="btn-sm btn-blue" onclick="loadData()">更新</button>
      </div>
    </div>

    <!-- KPI -->
    <div class="kpi-grid" id="kpiGrid">
      <div class="kpi-card"><div class="kpi-label">対象者数</div><div class="kpi-value" id="kpiTotal">-</div></div>
      <div class="kpi-card"><div class="kpi-label">有給未達者</div><div class="kpi-value danger" id="kpiWarn">-</div></div>
      <div class="kpi-card"><div class="kpi-label">危険レベル</div><div class="kpi-value danger" id="kpiDanger">-</div></div>
      <div class="kpi-card"><div class="kpi-label">平均有給回数</div><div class="kpi-value" id="kpiAvg">-</div></div>
    </div>

    <!-- テーブル -->
    <div class="card">
      <div style="font-weight:900;letter-spacing:.05em;margin-bottom:8px;">有給取得状況一覧</div>
      <div class="table-scroll">
        <div id="tableWrap"><div class="loading">読込中...</div></div>
      </div>
    </div>
  </div>

<script>
var APP_URL = '<?= APP_URL ?>';
var PORTAL_URL = '<?= PORTAL_URL ?>';
var currentData = [];
var SELECTED_DEPTS = [];
var SELECTED_NAME = '';
var IS_ADMIN = false;
var ALL_PROFILES = [];

window.addEventListener('DOMContentLoaded', function() {
  if (PORTAL_URL) document.getElementById('portalLink').style.display = '';
  google.script.run.withSuccessHandler(function(ok) {
    if (ok) document.getElementById('navSomu').style.display = '';
  }).api_isSomu();

  // 年度セレクト初期化
  var fySelect = document.getElementById('fySelect');
  var now = new Date();
  var _m = now.getMonth() + 1, _d = now.getDate();
  var currentFy = (_m < 3 || (_m === 3 && _d < 16)) ? now.getFullYear() - 1 : now.getFullYear();
  for (var y = currentFy + 2; y >= currentFy - 2; y--) {
    var opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y + '年度';
    if (y === currentFy) opt.selected = true;
    fySelect.appendChild(opt);
  }

  // 承認者プロファイル取得 → モーダル or 自動選択
  initApprover();
});

function initApprover() {
  document.getElementById('headerSub').textContent = '承認者情報を読込中...';
  google.script.run
    .withSuccessHandler(function(result) {
      IS_ADMIN = result.isAdmin;
      ALL_PROFILES = result.profiles || [];

      if (IS_ADMIN) {
        // 管理者 → 承認者選択モーダルを表示
        document.getElementById('btnChangeApprover').style.display = '';
        showApproverModal();
      } else if (ALL_PROFILES.length === 1) {
        // 一般承認者（1人）→ 自動選択してダッシュボード表示
        selectApprover(ALL_PROFILES[0].name, ALL_PROFILES[0].depts);
      } else if (ALL_PROFILES.length > 1) {
        // 複数プロファイル（通常はない）→ モーダル表示
        showApproverModal();
      } else {
        document.getElementById('headerSub').textContent = '担当部署が登録されていません';
        document.getElementById('tableWrap').innerHTML = '<div class="loading">M_DEPT_APPROVERSに登録がありません。</div>';
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('headerSub').textContent = 'エラー: ' + err.message;
    })
    .api_getApproverProfiles();
}

function showApproverModal() {
  var container = document.getElementById('approverList');
  container.innerHTML = '';

  if (IS_ADMIN) {
    // 「全部署」ボタン
    var allDepts = [];
    for (var i = 0; i < ALL_PROFILES.length; i++) {
      for (var j = 0; j < ALL_PROFILES[i].depts.length; j++) {
        if (allDepts.indexOf(ALL_PROFILES[i].depts[j]) < 0) {
          allDepts.push(ALL_PROFILES[i].depts[j]);
        }
      }
    }
    var allBtn = document.createElement('button');
    allBtn.className = 'approver-btn all-dept';
    allBtn.innerHTML = '全部署<div class="dept-list">' + escHtml(allDepts.join(', ')) + '</div>';
    allBtn.onclick = (function(d) { return function() { selectApprover('全部署', d); }; })(allDepts);
    container.appendChild(allBtn);
  }

  // 各承認者ボタン
  for (var i = 0; i < ALL_PROFILES.length; i++) {
    var p = ALL_PROFILES[i];
    var btn = document.createElement('button');
    btn.className = 'approver-btn';
    btn.innerHTML = escHtml(p.name) + '<div class="dept-list">' + escHtml(p.depts.join(', ')) + '</div>';
    btn.onclick = (function(name, depts) { return function() { selectApprover(name, depts); }; })(p.name, p.depts);
    container.appendChild(btn);
  }

  document.getElementById('approverModal').classList.remove('hidden');
}

function selectApprover(name, depts) {
  SELECTED_NAME = name;
  SELECTED_DEPTS = depts;
  document.getElementById('approverModal').classList.add('hidden');
  document.getElementById('headerSub').textContent = '担当: ' + name + '（' + depts.join(', ') + '）';
  loadData();
}

function loadData() {
  if (!SELECTED_DEPTS.length) return;
  var wrap = document.getElementById('tableWrap');
  wrap.innerHTML = '<div class="loading">読込中...</div>';
  var fy = Number(document.getElementById('fySelect').value);

  google.script.run
    .withSuccessHandler(function(result) {
      currentData = result.workers || [];
      renderKpi(currentData);
      renderTable(currentData);
    })
    .withFailureHandler(function(err) {
      wrap.innerHTML = '<div class="loading" style="color:var(--danger);">エラー: ' + escHtml(err.message) + '</div>';
    })
    .api_getDeptAdminView(fy, SELECTED_DEPTS);
}

function renderKpi(data) {
  var total = data.length;
  var warnCount = 0;
  var dangerCount = 0;
  var paidSum = 0;

  for (var i = 0; i < data.length; i++) {
    var d = data[i];
    paidSum += (d.paidCount || 0);
    if (d.warnLevel && d.warnLevel !== '') warnCount++;
    if (d.warnLevel === '危険') dangerCount++;
  }

  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiWarn').textContent = warnCount;
  document.getElementById('kpiDanger').textContent = dangerCount;
  document.getElementById('kpiAvg').textContent = total > 0 ? (paidSum / total).toFixed(1) : '-';
}

function renderTable(data) {
  var wrap = document.getElementById('tableWrap');
  if (!data.length) {
    wrap.innerHTML = '<div class="loading">データなし</div>';
    return;
  }

  var html = '<table><thead><tr>'
    + '<th>部署</th><th>氏名</th><th>有給</th>'
    + '<th>春期<br>(3/16-6月)<br><span style="font-size:10px;color:var(--muted);">目標1回</span></th><th>夏期<br>(7-8月)<br><span style="font-size:10px;color:var(--muted);">目標2回</span></th><th>秋期<br>(9-11月)<br><span style="font-size:10px;color:var(--muted);">目標3回</span></th><th>冬期<br>(12-2月)<br><span style="font-size:10px;color:var(--muted);">目標4回</span></th><th>年度末<br>(2-3月)<br><span style="font-size:10px;color:var(--muted);">目標5回</span></th>'
    + '<th>振替</th><th>特別</th><th>合計</th><th>最終有給日</th><th>警告</th>'
    + '</tr></thead><tbody>';

  for (var i = 0; i < data.length; i++) {
    var d = data[i];
    var rowClass = '';
    if (d.warnLevel === '危険') rowClass = 'danger-row';
    else if (d.warnLevel === '警告') rowClass = 'warn-row';
    else if (d.warnLevel === '注意') rowClass = 'caution-row';

    // Quarter cells - 「残X」表示（5 - 累計取得数）で色分け
    var quarters = d.quarters || [];
    var qHtml = '';
    for (var qi = 0; qi < 5; qi++) {
      var q = quarters[qi];
      if (!q) {
        qHtml += '<td class="qcell"><span class="pill">―</span></td>';
      } else {
        var remaining = Math.max(0, 5 - Number(q.cumulativeCount || 0));
        var sh = Number(q.shortage || 0);
        if (q.isFuture) {
          qHtml += '<td class="qcell"><span class="pill">残' + remaining + '</span></td>';
        } else if (remaining === 0) {
          qHtml += '<td class="qcell"><span class="pill ok">達成</span></td>';
        } else if (sh >= 2) {
          qHtml += '<td class="qcell"><span class="pill danger">残' + remaining + '</span></td>';
        } else if (sh >= 1) {
          qHtml += '<td class="qcell"><span class="pill warn">残' + remaining + '</span></td>';
        } else {
          qHtml += '<td class="qcell"><span class="pill ok">残' + remaining + '</span></td>';
        }
      }
    }

    // Warning pill
    var warnPill = '';
    if (d.warnLevel === '危険') warnPill = '<span class="pill danger">' + escHtml(d.warnLevel) + '</span>';
    else if (d.warnLevel === '警告') warnPill = '<span class="pill warn">' + escHtml(d.warnLevel) + '</span>';
    else if (d.warnLevel === '注意') warnPill = '<span class="pill caution">' + escHtml(d.warnLevel) + '</span>';
    else warnPill = '<span class="pill ok">OK</span>';

    html += '<tr class="' + rowClass + '">'
      + '<td>' + escHtml(d.deptName) + '</td>'
      + '<td>' + escHtml(d.workerName) + '</td>'
      + '<td>' + (d.paidCount || 0) + (d.paidHalfCount > 0 ? ' <span style="font-size:11px;color:var(--muted);">(' + d.paidHalfCount + '半)</span>' : '') + '</td>'
      + qHtml
      + '<td>' + (d.substituteCount || 0) + '</td>'
      + '<td>' + (d.specialCount || 0) + '</td>'
      + '<td style="font-weight:700;">' + (d.totalCount || 0) + '</td>'
      + '<td>' + escHtml(d.lastPaidDate || '-') + '</td>'
      + '<td>' + warnPill + '</td>'
      + '</tr>';
  }

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
</body>
</html>
