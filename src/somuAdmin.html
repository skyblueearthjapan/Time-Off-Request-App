<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{--bg1:#eaf6ff;--bg2:#f7fffb;--accent:#1f9d55;--accent2:#0ea5e9;--text:#0b2545;--muted:#5c6b7a;--card:#ffffffcc;--line:#d7e7f5;--danger:#ff5a5f;--warn:#ffb020;}
    *{box-sizing:border-box;}
    body{
      margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      color:var(--text);
      background:radial-gradient(1100px 600px at 18% 0%,var(--bg1),transparent),
        radial-gradient(1100px 600px at 92% 20%,var(--bg2),transparent),
        linear-gradient(180deg,#ffffff,#f3fbff);
    }
    header{
      padding:18px 22px;display:flex;align-items:flex-end;justify-content:space-between;
      border-bottom:1px solid var(--line);backdrop-filter:blur(8px);
      position:sticky;top:0;background:rgba(255,255,255,.55);z-index:10;
    }
    .title{font-weight:900;letter-spacing:.06em;font-size:18px;}
    .sub{opacity:.8;font-size:12px;color:var(--muted);}
    .wrap{padding:18px 22px;max-width:1200px;margin:0 auto;}
    .card{
      background:var(--card);border:1px solid var(--line);border-radius:18px;
      padding:14px 18px;box-shadow:0 10px 30px rgba(10,40,80,.06);margin-bottom:14px;
    }
    .card-accent{border-left:4px solid var(--accent2);}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
    button{
      padding:10px 16px;border-radius:12px;border:0;
      background:linear-gradient(135deg,var(--accent),#1bd67f);
      color:#fff;font-weight:800;cursor:pointer;font-size:14px;
      box-shadow:0 10px 22px rgba(31,157,85,.20);
    }
    button:disabled{opacity:.5;cursor:not-allowed;}
    .btn-blue{background:linear-gradient(135deg,var(--accent2),#38bdf8);box-shadow:0 10px 22px rgba(14,165,233,.20);}
    .btn-sm{padding:6px 10px;font-size:12px;border-radius:8px;}
    .ghost{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none;}
    .pill{padding:4px 10px;border-radius:999px;font-size:12px;border:1px solid var(--line);background:#fff;display:inline-block;}
    .danger{border-color:#ffb3b3;background:#fff0f0;color:#7a0b0b;}
    .warn{border-color:#ffd29e;background:#fff6eb;color:#7a4a0b;}
    .ok{border-color:#bfe9d0;background:#f0fff6;color:#0b5a2b;}
    .info{border-color:#b3d4ff;background:#f0f7ff;color:#0b2a5a;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th,td{border-bottom:1px solid var(--line);padding:10px 8px;text-align:left;}
    th{font-size:12px;color:var(--muted);}
    tr.warn-row{background:#fff8ee;}
    tr.danger-row{background:#fff0f0;}
    a{color:var(--accent2);text-decoration:none;}
    a:hover{text-decoration:underline;}
    .nav-link{font-size:13px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--text);}
    .nav-link:hover{background:var(--bg1);text-decoration:none;}
    .portal-link{
      font-size:13px;padding:6px 14px;border-radius:8px;
      background:linear-gradient(135deg,var(--accent),#1bd67f);
      color:#fff;font-weight:700;text-decoration:none;
    }
    .portal-link:hover{opacity:.9;text-decoration:none;}
    .loading{text-align:center;padding:30px;color:var(--muted);}
    select{padding:8px 14px;border-radius:999px;border:1px solid var(--line);font-size:14px;font-weight:700;min-width:160px;}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
    .kpi-card{
      background:var(--card);border:1px solid var(--line);border-radius:14px;
      padding:14px;text-align:center;
    }
    .kpi-label{font-size:12px;color:var(--muted);margin-bottom:4px;}
    .kpi-value{font-size:24px;font-weight:900;}
    .kpi-value.danger{color:var(--danger);}
    .kpi-value.warn{color:var(--warn);}
    .table-scroll{overflow-x:auto;}
    input[type="checkbox"]{width:16px;height:16px;cursor:pointer;}
    .batch-bar{display:flex;gap:10px;align-items:center;margin-bottom:10px;padding:8px 12px;background:#f1f5f9;border-radius:10px;}
    .batch-bar .count{font-size:13px;font-weight:700;color:var(--muted);}
    /* 承認者選択ドロップダウン */
    .approver2-select{padding:8px 14px;border-radius:10px;border:1px solid var(--line);font-size:14px;min-width:200px;}
    @media(max-width:640px){
      header{flex-direction:column;align-items:flex-start;gap:8px;}
      .wrap{padding:12px 10px;}
      .kpi-grid{grid-template-columns:1fr 1fr;}
      table{font-size:12px;}
      th,td{padding:8px 4px;}
      select{min-width:auto;width:100%;}
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="title">総務管理ダッシュボード</div>
      <div class="sub">全社 有給取得義務管理 + 2次承認</div>
    </div>
    <div class="row">
      <a href="<?= APP_URL ?>?page=top" target="_top" class="nav-link">申請TOP</a>
      <a href="<?= APP_URL ?>?page=deptAdmin" target="_top" class="nav-link" id="navDept" style="display:none;">部署管理</a>
      <a href="<?= PORTAL_URL ?>" target="_top" class="portal-link" id="portalLink" style="display:none;">社内ポータルへ移動</a>
    </div>
  </header>

  <div class="wrap">
    <!-- ====== 2次承認セクション ====== -->
    <div class="card card-accent">
      <div style="font-weight:900;letter-spacing:.05em;margin-bottom:8px;">
        2次承認待ち一覧
        <span class="pill info" id="pending2Count">読込中...</span>
      </div>

      <!-- 2次承認者表示 -->
      <div style="margin-bottom:10px;">
        <label style="font-weight:700;font-size:13px;">2次承認者：</label>
        <span id="approver2Name" style="font-size:13px;">読込中...</span>
      </div>

      <!-- 一括操作バー -->
      <div class="batch-bar" id="batchBar" style="display:none;">
        <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
        <span class="count" id="selectedCount">0件選択中</span>
        <button class="btn-sm btn-blue" id="batchApproveBtn" onclick="batchApprove2()" disabled>一括2次承認</button>
      </div>

      <div class="table-scroll">
        <div id="approval2Wrap"><div class="loading">読込中...</div></div>
      </div>
    </div>

    <!-- ====== 有給管理セクション ====== -->
    <div class="card" style="padding:12px 16px;">
      <div class="row">
        <div>
          <label style="font-weight:700;font-size:13px;">年度：</label>
          <select id="fySelect"></select>
        </div>
        <div>
          <label style="font-weight:700;font-size:13px;">部署：</label>
          <select id="deptFilter"><option value="ALL">全部署</option></select>
        </div>
        <button class="btn-sm btn-blue" onclick="loadData()">更新</button>
        <button class="btn-sm ghost" onclick="exportCsv()">CSVエクスポート</button>
      </div>
    </div>

    <div class="kpi-grid" id="kpiGrid">
      <div class="kpi-card"><div class="kpi-label">対象者数</div><div class="kpi-value" id="kpiTotal">-</div></div>
      <div class="kpi-card"><div class="kpi-label">有給未達者</div><div class="kpi-value danger" id="kpiWarn">-</div></div>
      <div class="kpi-card"><div class="kpi-label">危険レベル</div><div class="kpi-value danger" id="kpiDanger">-</div></div>
      <div class="kpi-card"><div class="kpi-label">平均有給回数</div><div class="kpi-value" id="kpiAvg">-</div></div>
    </div>

    <div class="card">
      <div style="font-weight:900;letter-spacing:.05em;margin-bottom:8px;">有給取得義務 管理一覧</div>
      <div class="table-scroll" id="tableWrap"><div class="loading">読込中...</div></div>
    </div>
  </div>

<script>
var APP_URL = '<?= APP_URL ?>';
var PORTAL_URL = '<?= PORTAL_URL ?>';
var currentData = [];
var pending2Data = [];
var selectedApprover2 = '';

window.addEventListener('DOMContentLoaded', function() {
  if (PORTAL_URL) document.getElementById('portalLink').style.display = '';
  google.script.run.withSuccessHandler(function(ok) {
    if (ok) document.getElementById('navDept').style.display = '';
  }).api_isDeptApprover();
  google.script.run.withSuccessHandler(function(ok) {
    if (ok) document.getElementById('navDept').style.display = '';
  }).api_isAdmin();

  // 年度セレクト初期化
  var fySelect = document.getElementById('fySelect');
  var now = new Date();
  var currentFy = now.getMonth() + 1 < 4 ? now.getFullYear() - 1 : now.getFullYear();
  for (var y = currentFy + 2; y >= currentFy - 2; y--) {
    var opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y + '年度';
    if (y === currentFy) opt.selected = true;
    fySelect.appendChild(opt);
  }

  // 部署フィルタ読込
  google.script.run.withSuccessHandler(function(depts) {
    var sel = document.getElementById('deptFilter');
    depts.forEach(function(d) {
      var opt = document.createElement('option');
      opt.value = d.deptId;
      opt.textContent = d.deptName;
      sel.appendChild(opt);
    });
  }).api_getDeptList();

  document.getElementById('deptFilter').addEventListener('change', function() { loadData(); });

  // 2次承認者（ログインユーザー）取得
  loadApprover2Info();

  // 2次承認待ち読込
  loadPending2();

  // 有給データ読込
  loadData();
});

// ====== 2次承認者（ログインユーザー自動取得） ======
function loadApprover2Info() {
  google.script.run.withSuccessHandler(function(info) {
    // info = { email, name }
    selectedApprover2 = info.email;
    var display = document.getElementById('approver2Name');
    display.innerHTML = '<strong>' + escHtml(info.name) + '</strong>（' + escHtml(info.email) + '）';
    updateBatchBtn();
  }).withFailureHandler(function(err) {
    document.getElementById('approver2Name').textContent = 'エラー: ' + err.message;
  }).api_getCurrentApproverInfo();
}

// ====== 2次承認待ち一覧 ======
function loadPending2() {
  var wrap = document.getElementById('approval2Wrap');
  wrap.innerHTML = '<div class="loading">読込中...</div>';
  google.script.run.withSuccessHandler(function(data) {
    pending2Data = data || [];
    document.getElementById('pending2Count').textContent = pending2Data.length + '件';
    renderPending2();
  }).withFailureHandler(function(err) {
    wrap.innerHTML = '<div class="loading" style="color:var(--danger);">エラー: ' + escHtml(err.message) + '</div>';
    document.getElementById('pending2Count').textContent = 'エラー';
  }).api_getPending2ndApprovals();
}

function renderPending2() {
  var wrap = document.getElementById('approval2Wrap');
  if (!pending2Data.length) {
    wrap.innerHTML = '<div class="loading" style="color:var(--accent);">2次承認待ちの申請はありません</div>';
    document.getElementById('batchBar').style.display = 'none';
    return;
  }
  document.getElementById('batchBar').style.display = 'flex';

  var html = '<table><thead><tr>'
    + '<th style="width:30px;"></th>'
    + '<th>部署</th><th>氏名</th><th>休暇日</th><th>休暇種類</th><th>区分</th><th>1次承認日</th><th>操作</th>'
    + '</tr></thead><tbody>';

  for (var i = 0; i < pending2Data.length; i++) {
    var d = pending2Data[i];
    html += '<tr data-reqid="' + escHtml(d.reqId) + '" style="transition:all .5s ease;">'
      + '<td><input type="checkbox" class="row-check" data-idx="' + i + '" onchange="updateSelectedCount()"></td>'
      + '<td>' + escHtml(d.deptName) + '</td>'
      + '<td>' + escHtml(d.workerName) + '</td>'
      + '<td>' + escHtml(d.leaveDate) + '</td>'
      + '<td>' + escHtml(d.leaveType) + '</td>'
      + '<td>' + escHtml(d.leaveKubun) + '</td>'
      + '<td>' + escHtml(d.approvedAt) + '</td>'
      + '<td><button class="btn-sm" onclick="singleApprove2(' + i + ', this)">2次承認</button></td>'
      + '</tr>';
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function fadeOutRow(reqId, callback) {
  var row = document.querySelector('tr[data-reqid="' + reqId + '"]');
  if (row) {
    row.style.background = '#e6ffed';
    setTimeout(function() {
      row.style.opacity = '0';
      row.style.transform = 'translateX(40px)';
      row.style.maxHeight = row.offsetHeight + 'px';
      row.style.overflow = 'hidden';
      setTimeout(function() {
        row.style.maxHeight = '0';
        row.style.padding = '0';
        setTimeout(function() {
          row.remove();
          // カウント更新
          var remaining = document.querySelectorAll('tr[data-reqid]').length;
          document.getElementById('pending2Count').textContent = remaining + '件';
          if (remaining === 0) {
            document.getElementById('approval2Wrap').innerHTML = '<div class="loading" style="color:var(--accent);">2次承認待ちの申請はありません</div>';
            document.getElementById('batchBar').style.display = 'none';
          }
          if (callback) callback();
        }, 300);
      }, 300);
    }, 400);
  } else {
    if (callback) callback();
  }
}

function singleApprove2(idx, btn) {
  if (!selectedApprover2) {
    alert('2次承認者（電子印）を選択してください。');
    return;
  }
  var d = pending2Data[idx];
  if (!confirm(d.workerName + 'さんの休暇届（' + d.leaveDate + '）を2次承認しますか？')) return;

  btn.disabled = true;
  btn.textContent = '処理中...';
  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.ok) {
        btn.textContent = '✓';
        fadeOutRow(d.reqId);
      } else {
        btn.textContent = '失敗';
        btn.disabled = false;
      }
    })
    .withFailureHandler(function(err) {
      alert('エラー: ' + err.message);
      btn.textContent = '2次承認';
      btn.disabled = false;
    })
    .api_approveLeaveRequest2(d.reqId, selectedApprover2);
}

function toggleSelectAll() {
  var checked = document.getElementById('selectAll').checked;
  var boxes = document.querySelectorAll('.row-check');
  for (var i = 0; i < boxes.length; i++) boxes[i].checked = checked;
  updateSelectedCount();
}

function updateSelectedCount() {
  var boxes = document.querySelectorAll('.row-check:checked');
  document.getElementById('selectedCount').textContent = boxes.length + '件選択中';
  updateBatchBtn();
}

function updateBatchBtn() {
  var boxes = document.querySelectorAll('.row-check:checked');
  document.getElementById('batchApproveBtn').disabled = boxes.length === 0 || !selectedApprover2;
}

function batchApprove2() {
  if (!selectedApprover2) {
    alert('2次承認者（電子印）を選択してください。');
    return;
  }
  var boxes = document.querySelectorAll('.row-check:checked');
  var reqIds = [];
  for (var i = 0; i < boxes.length; i++) {
    var idx = Number(boxes[i].dataset.idx);
    reqIds.push(pending2Data[idx].reqId);
  }
  if (!reqIds.length) return;
  if (!confirm(reqIds.length + '件を一括2次承認しますか？\n（1件あたり約15秒かかります）')) return;

  var btn = document.getElementById('batchApproveBtn');
  btn.disabled = true;
  document.getElementById('selectAll').disabled = true;
  var boxes2 = document.querySelectorAll('.row-check');
  for (var b = 0; b < boxes2.length; b++) boxes2[b].disabled = true;

  var total = reqIds.length;
  var okCount = 0;
  var errCount = 0;
  var current = 0;

  function processNext() {
    if (current >= total) {
      btn.textContent = '一括2次承認';
      document.getElementById('selectAll').disabled = false;
      if (errCount > 0) {
        alert('完了: ' + okCount + '件成功, ' + errCount + '件失敗');
        loadPending2();
      }
      updateBatchBtn();
      return;
    }
    var reqId = reqIds[current];
    btn.textContent = '承認中... (' + (current + 1) + '/' + total + ')';

    google.script.run
      .withSuccessHandler(function() {
        okCount++;
        current++;
        fadeOutRow(reqId, function() { processNext(); });
      })
      .withFailureHandler(function(err) {
        console.error('2次承認エラー: ' + reqId + ' ' + err.message);
        errCount++;
        current++;
        // エラー行は赤くする
        var row = document.querySelector('tr[data-reqid="' + reqId + '"]');
        if (row) { row.style.background = '#ffe0e0'; }
        processNext();
      })
      .api_approveLeaveRequest2(reqId, selectedApprover2);
  }
  processNext();
}

// ====== 有給管理 ======
function loadData() {
  var wrap = document.getElementById('tableWrap');
  wrap.innerHTML = '<div class="loading">読込中...</div>';
  var fy = Number(document.getElementById('fySelect').value);
  var deptFilter = document.getElementById('deptFilter').value;

  google.script.run.withSuccessHandler(function(data) {
    currentData = data;
    renderKpi(data);
    renderTable(data);
  }).withFailureHandler(function(err) {
    wrap.innerHTML = '<div class="loading" style="color:var(--danger);">エラー: ' + escHtml(err.message) + '</div>';
  }).api_getSomuAdminView(fy, deptFilter);
}

function renderKpi(data) {
  var total = data.length;
  var warnCount = 0;
  var dangerCount = 0;
  var paidSum = 0;

  data.forEach(function(d) {
    paidSum += (d.paidCount || 0);
    if (d.warnLevel !== '') warnCount++;
    if (d.warnLevel === '危険') dangerCount++;
  });

  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiWarn').textContent = warnCount;
  document.getElementById('kpiDanger').textContent = dangerCount;
  document.getElementById('kpiAvg').textContent = total > 0 ? (paidSum / total).toFixed(1) : '-';
}

function renderTable(data) {
  var wrap = document.getElementById('tableWrap');
  if (!data.length) {
    wrap.innerHTML = '<div class="loading">データなし</div>';
    return;
  }

  var html = '<table><thead><tr>'
    + '<th>部署</th><th>氏名</th><th>有給</th>'
    + '<th>春期(4-6月)<br><span style="font-size:10px;color:var(--muted);">累計1回</span></th><th>夏期(7-8月)<br><span style="font-size:10px;color:var(--muted);">累計2回</span></th><th>秋期(9-11月)<br><span style="font-size:10px;color:var(--muted);">累計3回</span></th><th>冬期(12-2月)<br><span style="font-size:10px;color:var(--muted);">累計4回</span></th><th>年度末(2-3月)<br><span style="font-size:10px;color:var(--muted);">累計5回</span></th>'
    + '<th>振替</th><th>特別</th><th>合計</th><th>最終有給日</th><th>警告</th>'
    + '</tr></thead><tbody>';

  data.forEach(function(d) {
    var rowClass = '';
    if (d.warnLevel === '危険') rowClass = 'danger-row';
    else if (d.warnLevel === '警告' || d.warnLevel === '注意') rowClass = 'warn-row';

    var warnPill = '';
    if (d.warnLevel === '危険') warnPill = '<span class="pill danger">' + escHtml(d.warnLevel) + '</span>';
    else if (d.warnLevel === '警告') warnPill = '<span class="pill warn">' + escHtml(d.warnLevel) + '</span>';
    else if (d.warnLevel === '注意') warnPill = '<span class="pill info">' + escHtml(d.warnLevel) + '</span>';
    else warnPill = '<span class="pill ok">OK</span>';

    var quarters = d.quarters || [];

    html += '<tr class="' + rowClass + '">'
      + '<td>' + escHtml(d.deptName) + '</td>'
      + '<td>' + escHtml(d.workerName) + '</td>'
      + '<td>' + d.paidCount + (d.paidHalfCount > 0 ? ' <span style="font-size:11px;color:var(--muted);">(' + d.paidHalfCount + '半)</span>' : '') + '</td>'
      + renderQuarterCell(quarters[0])
      + renderQuarterCell(quarters[1])
      + renderQuarterCell(quarters[2])
      + renderQuarterCell(quarters[3])
      + renderQuarterCell(quarters[4])
      + '<td>' + d.substituteCount + '</td>'
      + '<td>' + d.specialCount + '</td>'
      + '<td style="font-weight:700;">' + d.totalCount + '</td>'
      + '<td>' + (d.lastPaidDate || '-') + '</td>'
      + '<td>' + warnPill + '</td>'
      + '</tr>';
  });

  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function renderQuarterCell(q) {
  if (!q) return '<td><span class="pill">―</span></td>';
  if (q.isFuture) return '<td><span class="pill">' + q.periodCount + '</span></td>';
  if (q.level === 'danger') return '<td><span class="pill danger">' + q.periodCount + '</span></td>';
  if (q.level === 'warn') return '<td><span class="pill warn">' + q.periodCount + '</span></td>';
  return '<td><span class="pill ok">' + q.periodCount + '</span></td>';
}

function exportCsv() {
  if (!currentData.length) { alert('データがありません'); return; }
  var headers = ['部署','氏名','有給回数','有給半日回数','春期(4-6月)','夏期(7-8月)','秋期(9-11月)','冬期(12-2月)','年度末(2-3月)','振替回数','特別回数','合計回数','最終有給日','警告レベル'];
  var lines = [headers.join(',')];

  currentData.forEach(function(d) {
    var quarters = d.quarters || [];
    lines.push([
      csvEsc(d.deptName),
      csvEsc(d.workerName),
      d.paidCount,
      d.paidHalfCount,
      quarterText(quarters[0]),
      quarterText(quarters[1]),
      quarterText(quarters[2]),
      quarterText(quarters[3]),
      quarterText(quarters[4]),
      d.substituteCount,
      d.specialCount,
      d.totalCount,
      csvEsc(d.lastPaidDate || ''),
      csvEsc(d.warnLevel || 'OK')
    ].join(','));
  });

  var csv = lines.join('\n');
  var bom = '\uFEFF';
  var blob = new Blob([bom + csv], {type:'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '有給取得管理_' + document.getElementById('fySelect').value + '年度.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function quarterText(q) {
  if (!q) return '―';
  if (q.taken) return '✓';
  if (q.overdue) return '✗';
  return '―';
}

function csvEsc(s) {
  s = String(s || '');
  if (/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

function escHtml(s) {
  if (!s) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
