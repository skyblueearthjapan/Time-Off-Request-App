<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --title-bg:#1a365d;--title-fg:#fff;
      --label-bg:#e8edf3;--label-fg:#1a365d;
      --border:#94a3b8;--section-bg:#f1f5f9;
      --text:#1a202c;--muted:#718096;
      --accent:#1f9d55;--line:#d7e7f5;
      --page-bg1:#eaf6ff;--page-bg2:#f7fffb;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;font-family:"Noto Sans JP","Yu Gothic",system-ui,sans-serif;
      color:var(--text);
      background:radial-gradient(1100px 600px at 18% 0%,var(--page-bg1),transparent),
        radial-gradient(1100px 600px at 92% 20%,var(--page-bg2),transparent),
        linear-gradient(180deg,#ffffff,#f3fbff);
      display:flex;flex-direction:column;min-height:100vh;
    }
    header{
      padding:14px 22px;display:flex;align-items:center;
      border-bottom:1px solid var(--line);backdrop-filter:blur(8px);
      background:rgba(255,255,255,.55);
    }
    .hdr-title{font-weight:900;letter-spacing:.06em;font-size:16px;}
    .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;}

    /* ===== 用紙 ===== */
    .paper{
      background:#fff;max-width:660px;width:100%;
      box-shadow:0 4px 30px rgba(0,0,0,.10);
      padding:0 0 24px;
    }

    /* タイトル帯 */
    .p-title{
      background:var(--title-bg);color:var(--title-fg);
      text-align:center;font-size:22px;font-weight:900;
      letter-spacing:.3em;padding:14px 0;
      margin:0 36px;
    }

    .p-body{padding:0 36px;}

    /* 届出日 */
    .p-date{text-align:right;font-size:12px;margin:10px 0 14px;color:var(--text);}

    /* テーブル共通 */
    .t{width:100%;border-collapse:collapse;margin-bottom:2px;}
    .t th,.t td{
      border:1px solid var(--border);padding:9px 14px;font-size:13px;
      vertical-align:middle;
    }
    .t th{
      background:var(--label-bg);color:var(--label-fg);
      font-weight:700;text-align:center;white-space:nowrap;width:130px;
      letter-spacing:.12em;
    }
    .t td{text-align:left;}

    /* セクション見出し */
    .sec-head{
      text-align:center;font-size:11px;font-weight:700;
      color:var(--label-fg);margin:6px 0 4px;letter-spacing:.15em;
    }

    /* 宣言文 */
    .declaration{
      text-align:center;font-size:13px;margin:18px 0 12px;
    }

    /* 届出者テーブル */
    .t-applicant th{width:130px;}
    .t-applicant .sub-label{
      font-size:10px;color:var(--muted);text-align:center;
      width:36px;padding:4px 6px;
    }
    .t-applicant .name-val{
      font-size:15px;font-weight:700;text-align:center;
    }

    /* 承認欄 */
    .t-approval{margin-top:12px;}
    .t-approval .approval-header{
      background:var(--section-bg);color:var(--label-fg);
      text-align:center;font-weight:700;font-size:12px;
      letter-spacing:.2em;
    }
    .t-approval .role-header{
      background:var(--section-bg);color:var(--label-fg);
      text-align:center;font-weight:700;font-size:12px;
    }
    .t-approval .seal-label{
      background:var(--label-bg);color:var(--label-fg);
      text-align:center;font-size:11px;width:80px;
    }
    .t-approval .seal-cell{
      height:76px;text-align:center;vertical-align:middle;
      min-width:100px;
    }
    .seal-cell .stamp-text{color:#cc0000;font-weight:700;font-size:12px;}
    .seal-cell .stamp-date{color:var(--muted);font-size:10px;margin-top:2px;}
    .t-approval .date-label{
      background:var(--label-bg);color:var(--label-fg);
      text-align:center;font-size:11px;
    }
    .t-approval .date-cell{
      text-align:center;font-size:11px;
    }

    /* フッター注記 */
    .note{font-size:10px;color:var(--muted);margin-top:10px;}

    /* REQ_ID */
    .req-id{text-align:right;font-size:10px;color:#aaa;margin-top:8px;font-style:italic;}

    /* ボタン */
    .actions{
      text-align:center;padding:20px;display:flex;gap:12px;justify-content:center;
    }
    button{
      padding:12px 24px;border-radius:12px;border:0;font-weight:800;cursor:pointer;font-size:15px;
    }
    .btn-approve{
      background:linear-gradient(135deg,var(--accent),#1bd67f);
      color:#fff;box-shadow:0 10px 22px rgba(31,157,85,.20);
    }
    .btn-back{
      background:#fff;color:var(--text);border:1px solid var(--line);
    }
    .loading{text-align:center;padding:60px;color:var(--muted);font-size:16px;}

    @media(max-width:640px){
      .p-title{font-size:17px;letter-spacing:.15em;margin:0 16px;}
      .p-body{padding:0 16px;}
      .t th{width:100px;padding:7px 8px;font-size:12px;}
      .t td{padding:7px 8px;font-size:12px;}
      .t-approval .seal-cell{height:60px;min-width:72px;}
    }
  </style>
</head>
<body>
  <header>
    <div class="hdr-title">休暇届 プレビュー</div>
  </header>

  <div class="wrap" id="contentWrap">
    <div class="loading" id="loadingMsg">読み込み中...</div>
  </div>

  <div class="actions" id="actionBar" style="display:none;">
    <button class="btn-back" id="backBtn">戻る</button>
    <button class="btn-approve" id="approveBtn">承認する（サイン画面へ）</button>
  </div>

<script>
var REQ_ID = '<?= REQ_ID ?>';
var APP_URL = '<?= APP_URL ?>';
var reqData = null;
var DOWS = ['日','月','火','水','木','金','土'];

window.addEventListener('DOMContentLoaded', function() {
  if (!REQ_ID) {
    document.getElementById('loadingMsg').textContent = 'REQ_IDが指定されていません。';
    return;
  }
  google.script.run
    .withSuccessHandler(function(data) {
      if (!data) {
        document.getElementById('loadingMsg').textContent = '申請データが見つかりません。（REQ_ID: ' + REQ_ID + '）';
        return;
      }
      reqData = data;
      try { renderPreview(data); } catch (err) {
        console.error('renderPreview error:', err);
        document.getElementById('loadingMsg').textContent = '表示エラー: ' + err.message;
      }
    })
    .withFailureHandler(function(err) {
      document.getElementById('loadingMsg').textContent = 'エラー: ' + err.message;
    })
    .api_getLeaveRequestById(REQ_ID);
});

function renderPreview(d) {
  var ld = d.leaveDate ? new Date(d.leaveDate) : new Date();
  var ry = ld.getFullYear() - 2018;

  // 届出日
  var sd = d.submittedAt ? new Date(d.submittedAt) : new Date();
  var submitStr = '令和' + (sd.getFullYear() - 2018) + '年'
    + (sd.getMonth() + 1) + '月' + sd.getDate() + '日 届出';

  // 休暇日
  var leaveDateStr = '令和' + ry + '年' + (ld.getMonth() + 1) + '月'
    + ld.getDate() + '日（' + DOWS[ld.getDay()] + '曜日）';

  // 休暇時間
  var timeStr = '終日　8:05 〜 17:10';
  if (d.leaveKubun === '半日休') {
    if (d.halfDayType === '午前') {
      timeStr = '午前半休　8:05 〜 12:15';
    } else {
      timeStr = '午後半休　13:00 〜 17:10';
    }
  }

  // 休暇区分
  var kubunStr = d.leaveKubun || '';
  if (d.halfDayType) kubunStr += '（' + d.halfDayType + '）';

  // 振替元出勤日
  var subStr = '―';
  if (d.leaveType === '振替休暇' && d.substituteDate) {
    var subD = new Date(d.substituteDate);
    subStr = '令和' + (subD.getFullYear() - 2018) + '年'
      + (subD.getMonth() + 1) + '月' + subD.getDate() + '日（' + DOWS[subD.getDay()] + '）';
  }

  // 理由
  var reason = '';
  if (d.leaveType === '特別休暇' && d.specialReason) reason = d.specialReason;
  else if (d.leaveType === '有給消化（私用）') reason = d.paidDetail || '私用の為';
  else if (d.leaveType === '振替休暇') reason = '振替休暇';
  else reason = d.leaveType || '―';

  // 承認
  var isApproved = (d.status === '承認済');
  var at1 = '';
  if (d.approvedAt) {
    var a1 = new Date(d.approvedAt);
    at1 = (a1.getFullYear() - 2018) + '/' + (a1.getMonth() + 1) + '/' + a1.getDate();
  }
  var at2 = '';
  if (d.approvedAt2) {
    var a2 = new Date(d.approvedAt2);
    at2 = (a2.getFullYear() - 2018) + '/' + (a2.getMonth() + 1) + '/' + a2.getDate();
  }

  var h = '<div class="paper">';

  // タイトル帯
  h += '<div class="p-title">休 暇 届</div>';

  h += '<div class="p-body">';

  // 届出日
  h += '<div class="p-date">' + e(submitStr) + '</div>';

  // 所属部署・氏名
  h += '<table class="t">';
  h += '<tr><th>所 属 部 署</th><td>' + e(d.deptName) + '</td></tr>';
  h += '<tr><th>氏　　　名</th><td>' + e(d.workerName) + '</td></tr>';
  h += '</table>';

  // 届出内容
  h += '<div class="sec-head">届 出 内 容</div>';
  h += '<table class="t">';
  h += '<tr><th>休 暇 日</th><td>' + e(leaveDateStr) + '</td></tr>';
  h += '<tr><th>休 暇 時 間</th><td>' + e(timeStr) + '</td></tr>';
  h += '<tr><th>休 暇 区 分</th><td>' + e(kubunStr) + '</td></tr>';
  h += '<tr><th>休 暇 種 類</th><td>' + e(d.leaveType) + '</td></tr>';
  h += '<tr><th>振替元出勤日</th><td>' + e(subStr) + '</td></tr>';
  h += '<tr><th>理由・詳細</th><td style="white-space:pre-wrap;">' + e(reason) + '</td></tr>';
  h += '</table>';

  // 宣言文
  h += '<div class="declaration">上記のとおり休暇を届け出いたします。</div>';

  // 届出者
  h += '<table class="t t-applicant">';
  h += '<tr>';
  h += '<th>届 出 者</th>';
  h += '<td class="sub-label">氏名</td>';
  h += '<td class="name-val">' + e(d.workerName) + '</td>';
  h += '</tr>';
  h += '</table>';

  // 承認欄
  h += '<table class="t t-approval">';
  h += '<tr><td class="approval-header" colspan="3">承 認 欄</td></tr>';
  h += '<tr>';
  h += '<td class="role-header" style="width:80px;"></td>';
  h += '<td class="role-header">部　長</td>';
  h += '<td class="role-header">所 属 長</td>';
  h += '</tr>';
  h += '<tr>';
  h += '<td class="seal-label">承認印</td>';
  // 部長セル
  h += '<td class="seal-cell">';
  if (d.approvedBy2) {
    h += '<div class="stamp-text">' + e(d.approvedBy2) + '</div>';
  }
  h += '</td>';
  // 所属長セル
  h += '<td class="seal-cell">';
  if (isApproved) {
    h += '<div class="stamp-text">（サイン）</div>';
  }
  h += '</td>';
  h += '</tr>';
  h += '<tr>';
  h += '<td class="date-label">承認日</td>';
  h += '<td class="date-cell">' + e(at2) + '</td>';
  h += '<td class="date-cell">' + e(at1) + '</td>';
  h += '</tr>';
  h += '</table>';

  // 注記
  h += '<div class="note">※後報の場合は、理由を詳しく記載すること。</div>';

  // REQ_ID
  h += '<div class="req-id">REQ_ID: ' + e(d.reqId) + '</div>';

  h += '</div>'; // p-body
  h += '</div>'; // paper

  document.getElementById('contentWrap').innerHTML = h;
  document.getElementById('actionBar').style.display = '';

  if (isApproved) {
    document.getElementById('approveBtn').style.display = 'none';
    var bb = document.getElementById('backBtn');
    bb.textContent = 'TOPに戻る';
    bb.style.background = 'linear-gradient(135deg,#1f9d55,#1bd67f)';
    bb.style.color = '#fff';
    bb.style.fontWeight = '800';
    bb.style.fontSize = '16px';
    bb.style.padding = '14px 32px';
    bb.style.boxShadow = '0 10px 22px rgba(31,157,85,.20)';
    bb.style.border = '0';
  } else {
    document.getElementById('backBtn').textContent = 'TOPに戻る';
  }
}

document.getElementById('backBtn').addEventListener('click', function() {
  window.top.location.href = APP_URL + '?page=top';
});
document.getElementById('approveBtn').addEventListener('click', function() {
  window.top.location.href = APP_URL + '?page=sign&reqId=' + REQ_ID;
});

function e(s) {
  if (s === null || s === undefined) return '';
  var d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
</body>
</html>
