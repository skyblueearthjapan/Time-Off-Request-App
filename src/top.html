<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --bg1:#eaf6ff;--bg2:#f7fffb;--accent:#1f9d55;--accent2:#0ea5e9;
      --text:#0b2545;--muted:#5c6b7a;--card:#ffffffcc;--line:#d7e7f5;
      --danger:#ff5a5f;--warn:#ffb020;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      color:var(--text);
      background:
        radial-gradient(1100px 600px at 18% 0%,var(--bg1),transparent),
        radial-gradient(1100px 600px at 92% 20%,var(--bg2),transparent),
        linear-gradient(180deg,#ffffff,#f3fbff);
    }
    header{
      padding:18px 22px;display:flex;align-items:flex-end;justify-content:space-between;
      border-bottom:1px solid var(--line);backdrop-filter:blur(8px);
      position:sticky;top:0;background:rgba(255,255,255,.55);z-index:10;
    }
    .title{font-weight:900;letter-spacing:.06em;font-size:18px;}
    .sub{opacity:.8;font-size:12px;color:var(--muted);}
    .wrap{padding:18px 22px;max-width:900px;margin:0 auto;}
    .card{
      background:var(--card);border:1px solid var(--line);border-radius:18px;
      padding:14px 18px;box-shadow:0 10px 30px rgba(10,40,80,.06);margin-bottom:14px;
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
    button{
      padding:10px 16px;border-radius:12px;border:0;
      background:linear-gradient(135deg,var(--accent),#1bd67f);
      color:#fff;font-weight:800;cursor:pointer;
      box-shadow:0 10px 22px rgba(31,157,85,.20);font-size:14px;
    }
    button:disabled{opacity:.5;cursor:not-allowed;}
    .btn-blue{background:linear-gradient(135deg,var(--accent2),#38bdf8);box-shadow:0 10px 22px rgba(14,165,233,.20);}
    .btn-sm{padding:6px 10px;font-size:12px;border-radius:8px;}
    .ghost{background:#fff;color:var(--text);border:1px solid var(--line);box-shadow:none;}
    .pill{padding:4px 10px;border-radius:999px;font-size:12px;border:1px solid var(--line);background:#fff;display:inline-block;}
    .danger{border-color:#ffb3b3;background:#fff0f0;color:#7a0b0b;}
    .warn{border-color:#ffd29e;background:#fff6eb;color:#7a4a0b;}
    .ok{border-color:#bfe9d0;background:#f0fff6;color:#0b5a2b;}
    .info{border-color:#b3d4ff;background:#f0f7ff;color:#0b2a5a;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th,td{border-bottom:1px solid var(--line);padding:10px 8px;text-align:left;}
    th{font-size:12px;color:var(--muted);}
    a{color:var(--accent2);text-decoration:none;}
    a:hover{text-decoration:underline;}
    .nav-link{font-size:13px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--text);}
    .nav-link:hover{background:var(--bg1);text-decoration:none;}
    .portal-link{
      font-size:13px;padding:6px 14px;border-radius:8px;
      background:linear-gradient(135deg,var(--accent),#1bd67f);
      color:#fff;font-weight:700;text-decoration:none;
    }
    .portal-link:hover{opacity:.9;text-decoration:none;}
    .loading{text-align:center;padding:30px;color:var(--muted);}
    select{padding:8px 14px;border-radius:999px;border:1px solid var(--line);font-size:14px;font-weight:700;min-width:180px;}
    .big-btn{
      display:block;width:100%;padding:18px;font-size:16px;
      text-align:center;border-radius:14px;margin:10px 0;
    }
    /* モーダル */
    .overlay{
      display:none;position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;
    }
    .overlay.active{display:flex;}
    .modal{
      background:#fff;border-radius:18px;padding:24px;max-width:540px;width:92%;
      max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);
    }
    .modal h3{margin:0 0 16px;font-weight:900;}
    .step{display:none;}
    .step.active{display:block;}
    .form-group{margin-bottom:14px;}
    .form-group label{display:block;font-weight:700;font-size:13px;margin-bottom:4px;color:var(--muted);}
    .form-group select,.form-group input,.form-group textarea{
      width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;
    }
    .form-group textarea{min-height:80px;resize:vertical;}
    .radio-group{display:flex;gap:8px;flex-wrap:wrap;}
    .radio-group label{
      padding:10px 16px;border:2px solid var(--line);border-radius:12px;cursor:pointer;
      font-weight:700;font-size:14px;transition:all .15s;flex:1;text-align:center;
      display:flex;align-items:center;justify-content:center;
      white-space:nowrap;min-width:0;
    }
    .radio-group input{display:none;}
    .radio-group input:checked+span{color:var(--accent);}
    .radio-group label:has(input:checked){border-color:var(--accent);background:#f0fff6;}
    .step-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;}
    .confirm-table{width:100%;font-size:13px;}
    .confirm-table th{text-align:right;padding:6px 10px 6px 0;color:var(--muted);width:35%;}
    .confirm-table td{padding:6px 0;}
    /* 本日の休暇者セクション */
    .card-today{border:2px solid #f97316;background:#fff;}
    /* ====== 過去申請カレンダー ====== */
    .retro-section{
      margin-top:14px;border:1px solid #fcd34d;background:#fffbeb;
      border-radius:12px;overflow:hidden;
    }
    .retro-toggle{
      display:block;width:100%;background:transparent;color:#92400e;
      border:0;padding:10px 14px;text-align:left;font-weight:800;font-size:13px;
      cursor:pointer;box-shadow:none;
    }
    .retro-toggle:hover{background:#fff3c4;}
    .retro-body{
      max-height:0;overflow:hidden;
      transition:max-height .25s ease;
      padding:0 14px;
    }
    .retro-section.open .retro-body{
      max-height:680px;padding:0 14px 14px;
    }
    .retro-warn{
      background:#fef3c7;border:1px solid #fcd34d;border-radius:8px;
      padding:8px 10px;font-size:12px;color:#7c2d12;line-height:1.5;
      margin-bottom:10px;
    }
    .retro-cal-header{
      display:flex;align-items:center;justify-content:space-between;
      margin-bottom:8px;
    }
    .retro-cal-header button{
      background:#fff;color:#92400e;border:1px solid #fcd34d;
      padding:4px 10px;font-size:13px;font-weight:800;border-radius:8px;
      box-shadow:none;
    }
    .retro-cal-header button:disabled{opacity:.4;cursor:not-allowed;}
    .retro-cal-title{font-weight:800;font-size:14px;color:#7c2d12;}
    .retro-cal-grid{
      display:grid;grid-template-columns:repeat(7,1fr);gap:2px;
    }
    .retro-cal-grid .dow{
      text-align:center;font-size:11px;font-weight:700;color:var(--muted);
      padding:4px 0;
    }
    .retro-cal-grid .dow.sun{color:#ff5a5f;}
    .retro-cal-grid .dow.sat{color:#0ea5e9;}
    .retro-cal-cell{
      aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
      font-size:13px;border-radius:8px;background:#fff;
      border:1px solid #fde68a;cursor:pointer;color:var(--text);
      user-select:none;
    }
    .retro-cal-cell.empty{background:transparent;border-color:transparent;cursor:default;}
    .retro-cal-cell.disabled{
      background:#f1f5f9;color:#cbd5e1;cursor:not-allowed;border-color:#e2e8f0;
    }
    .retro-cal-cell.workable:hover{background:#fff3c4;}
    .retro-cal-cell.selected{
      background:linear-gradient(135deg,#f59e0b,#f97316);
      color:#fff;font-weight:800;border-color:#f59e0b;
    }
    .retro-selected-info{
      margin-top:8px;font-size:13px;color:#7c2d12;font-weight:700;
    }
    @media(max-width:640px){
      header{flex-direction:column;align-items:flex-start;gap:8px;}
      .wrap{padding:12px 10px;}
      .row{flex-direction:column;align-items:stretch;}
      select{min-width:auto;width:100%;}
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="title">休暇届 申請TOP</div>
      <div class="sub">休暇届の申請と予定一覧</div>
    </div>
    <div class="row" id="navLinks">
      <a href="<?= APP_URL ?>?page=deptAdmin" target="_top" class="nav-link" id="navDept" style="display:none;">部署管理</a>
      <a href="<?= APP_URL ?>?page=somuAdmin" target="_top" class="nav-link" id="navSomu" style="display:none;">総務管理</a>
      <a href="<?= PORTAL_URL ?>" target="_top" class="portal-link" id="portalLink" style="display:none;">社内ポータルへ移動</a>
    </div>
  </header>

  <div class="wrap">
    <!-- 部署+作業員選択 -->
    <div class="card">
      <div style="font-weight:800;font-size:13px;margin-bottom:8px;color:var(--muted);">申請フォーム</div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <label style="font-weight:700;font-size:14px;">部署：</label>
        <select id="deptSelect"><option value="">読込中...</option></select>
        <label style="font-weight:700;font-size:14px;">作業員：</label>
        <select id="workerSelect"><option value="">-- 部署を先に選択 --</option></select>
      </div>
    </div>

    <!-- 申請ボタン -->
    <button class="big-btn" id="applyBtn" onclick="openModal()" disabled>休暇届を申請する</button>

    <!-- 承認待ち一覧 -->
    <div class="card" id="pendingCard" style="border:2px solid var(--accent2);">
      <div style="font-weight:900;letter-spacing:.05em;margin-bottom:8px;">
        承認待ち一覧
        <span id="pendingCount" style="font-size:13px;font-weight:700;color:var(--accent2);margin-left:8px;"></span>
      </div>
      <div id="pendingWrap">
        <div class="loading">読み込み中...</div>
      </div>
    </div>

    <!-- 本日の休暇者 -->
    <div class="card card-today" id="todaySectionCard" style="display:none;">
      <div style="font-weight:900;letter-spacing:.05em;margin-bottom:8px;">
        本日の休暇者
        <span id="todayLeaveCount" style="font-size:13px;font-weight:700;color:#f97316;margin-left:8px;"></span>
      </div>
      <div id="todayLeaveWrap"></div>
    </div>

    <!-- 今後の休暇予定 -->
    <div class="card">
      <div style="font-weight:900;letter-spacing:.05em;margin-bottom:8px;">
        今後の休暇予定
        <span id="leaveCount" style="font-size:13px;font-weight:700;color:var(--accent2);margin-left:8px;"></span>
      </div>
      <div id="leaveTableWrap">
        <div class="loading">読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- 申請モーダル -->
  <div class="overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle">休暇届 申請</h3>

      <!-- Step1: 休暇区分 -->
      <div class="step active" data-step="1">
        <div class="form-group">
          <label>休暇区分を選択してください</label>
          <div class="radio-group">
            <label><input type="radio" name="leaveKubun" value="全日休"><span>全日休</span></label>
            <label><input type="radio" name="leaveKubun" value="半日休"><span>半日休</span></label>
          </div>
        </div>
        <div class="step-actions">
          <button class="ghost btn-sm" onclick="closeModal()">キャンセル</button>
          <button class="btn-sm" onclick="nextStep(2)">次へ</button>
        </div>
      </div>

      <!-- Step2: 休暇日 -->
      <div class="step" data-step="2">
        <div class="form-group">
          <label>休暇日を選択してください（勤務日のみ）</label>
          <select id="leaveDate"><option value="">読込中...</option></select>
        </div>

        <!-- 過去申請カレンダー -->
        <div class="retro-section" id="retroSection">
          <button type="button" class="retro-toggle" id="retroToggleBtn" onclick="toggleRetroSection()">
            <span id="retroToggleIcon">&#9654;</span> &#128197; 過去日に申請する場合はこちら
          </button>
          <div class="retro-body">
            <div class="retro-warn">
              &#9888; 過去申請をされる場合は、必ず事前に承認者および総務へご連絡ください。
            </div>
            <div class="retro-cal-header">
              <button type="button" id="retroPrevBtn" onclick="changeRetroMonth(-1)">&#9664;</button>
              <div class="retro-cal-title" id="retroCalTitle">―</div>
              <button type="button" id="retroNextBtn" onclick="changeRetroMonth(1)">&#9654;</button>
            </div>
            <div class="retro-cal-grid" id="retroCalGrid"></div>
            <div class="retro-selected-info" id="retroSelectedInfo">選択中: なし</div>
          </div>
        </div>

        <div class="step-actions">
          <button class="ghost btn-sm" onclick="prevStep(1)">戻る</button>
          <button class="btn-sm" onclick="nextStep(3)">次へ</button>
        </div>
      </div>

      <!-- Step3: 半日区分（半日の場合のみ） -->
      <div class="step" data-step="3">
        <div class="form-group">
          <label>午前・午後を選択してください</label>
          <div class="radio-group">
            <label><input type="radio" name="halfDayType" value="午前"><span>午前</span></label>
            <label><input type="radio" name="halfDayType" value="午後"><span>午後</span></label>
          </div>
        </div>
        <div class="step-actions">
          <button class="ghost btn-sm" onclick="prevStep(2)">戻る</button>
          <button class="btn-sm" onclick="nextStep(4)">次へ</button>
        </div>
      </div>

      <!-- Step4: 休暇種類 -->
      <div class="step" data-step="4">
        <div class="form-group">
          <label>休暇種類を選択してください</label>
          <div class="radio-group" id="leaveTypeGroup"></div>
        </div>
        <div class="step-actions">
          <button class="ghost btn-sm" onclick="prevStepFromType()">戻る</button>
          <button class="btn-sm" onclick="nextStepFromType()">次へ</button>
        </div>
      </div>

      <!-- Step5: 振替元出勤日（振替休暇の場合） -->
      <div class="step" data-step="5">
        <div class="form-group">
          <label>休日出勤した日を選択してください</label>
          <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">
            振替元となる休日出勤日を選んでください
          </div>
          <select id="substituteDate"><option value="">読込中...</option></select>
        </div>
        <div class="step-actions">
          <button class="ghost btn-sm" onclick="prevStep(4)">戻る</button>
          <button class="btn-sm" onclick="nextStep(9)">確認へ</button>
        </div>
      </div>

      <!-- Step6: 特別休暇理由 -->
      <div class="step" data-step="6">
        <div class="form-group">
          <label>特別休暇の理由</label>
          <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">
            参考例：結婚休暇、忌引休暇、出産休暇 等
          </div>
          <textarea id="specialReason" placeholder="理由を入力してください"></textarea>
        </div>
        <div class="step-actions">
          <button class="ghost btn-sm" onclick="prevStep(4)">戻る</button>
          <button class="btn-sm" onclick="nextStep(9)">確認へ</button>
        </div>
      </div>

      <!-- Step7: 有給詳細 -->
      <div class="step" data-step="7">
        <div class="form-group">
          <label>理由</label>
          <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">
            病欠等の場合は詳しく記載してください（任意）
          </div>
          <textarea id="paidDetail" placeholder="例：私用のため（未入力の場合は「私用のため」になります）"></textarea>
        </div>
        <div class="step-actions">
          <button class="ghost btn-sm" onclick="prevStep(4)">戻る</button>
          <button class="btn-sm" onclick="nextStep(9)">確認へ</button>
        </div>
      </div>

      <!-- Step9: 確認 -->
      <div class="step" data-step="9">
        <table class="confirm-table">
          <tr><th>部署</th><td id="cfmDept"></td></tr>
          <tr><th>作業員</th><td id="cfmWorker"></td></tr>
          <tr><th>休暇区分</th><td id="cfmKubun"></td></tr>
          <tr><th>半日区分</th><td id="cfmHalfDay"></td></tr>
          <tr><th>休暇日</th><td id="cfmDate"></td></tr>
          <tr><th>休暇種類</th><td id="cfmType"></td></tr>
          <tr><th>振替元出勤日</th><td id="cfmSubDate"></td></tr>
          <tr><th>理由</th><td id="cfmReason"></td></tr>
        </table>
        <div class="step-actions">
          <button class="ghost btn-sm" onclick="prevStepFromConfirm()">戻る</button>
          <button class="btn-sm" id="submitBtn" onclick="submitRequest()">申請する</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 編集モーダル -->
  <div class="overlay" id="editOverlay">
    <div class="modal" style="max-width:420px;">
      <h3 id="editModalTitle">休暇届 編集</h3>
      <div class="form-group">
        <label>対象者</label>
        <div id="editInfo" style="font-weight:700;font-size:14px;padding:4px 0;"></div>
      </div>
      <div class="form-group">
        <label>休暇日</label>
        <input type="date" id="editLeaveDate" style="width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;font-size:14px;" />
      </div>
      <div class="form-group">
        <label>休暇区分</label>
        <div class="radio-group">
          <label><input type="radio" name="editLeaveKubun" value="全日休"><span>全日休</span></label>
          <label><input type="radio" name="editLeaveKubun" value="半日休"><span>半日休</span></label>
        </div>
      </div>
      <div class="form-group" id="editHalfDayWrap" style="display:none;">
        <label>半日区分</label>
        <div class="radio-group">
          <label><input type="radio" name="editHalfDayType" value="午前"><span>午前</span></label>
          <label><input type="radio" name="editHalfDayType" value="午後"><span>午後</span></label>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end;">
        <button class="ghost btn-sm" onclick="closeEditLeaveModal()">キャンセル</button>
        <button class="btn-blue btn-sm" id="editSaveBtn" onclick="saveEditLeave()">保存</button>
      </div>
    </div>
  </div>

<script>
var APP_URL = '<?= APP_URL ?>';
var PORTAL_URL = '<?= PORTAL_URL ?>';
var selectedDeptId = '';
var selectedDeptName = '';
var selectedWorkerId = '';
var selectedWorkerName = '';
var lookupData = null;
var workingDays = [];
var currentStep = 1;
// ====== 過去申請カレンダー用ステート ======
// selectedRetroactiveLeaveDate は 'yyyy-MM-dd' (ISO) 形式で内部保持する
// （表示時のみスラッシュ形式に整形。バックエンドは ISO 形式を要求）
var selectedRetroactiveLeaveDate = '';
var retroCalYear = 0;
var retroCalMonth = 0;                    // 1-12
var retroWorkingDaysCache = {};           // { 'yyyy-MM': ['yyyy-MM-dd', ...] }

// 今年度の開始日（3/16）を動的算出
// 3/16 以降なら当年の 3/16、それ以前なら前年の 3/16
function getFyStart_() {
  var t = new Date();
  var beforeMid = (t.getMonth() < 2) || (t.getMonth() === 2 && t.getDate() < 16);
  return new Date(beforeMid ? t.getFullYear() - 1 : t.getFullYear(), 2, 16);
}
var RETRO_MIN_DATE = getFyStart_();

// 'yyyy-MM-dd' → 'yyyy/MM/dd'（表示用）
function isoToSlash_(iso) {
  return iso ? iso.replace(/-/g, '/') : '';
}

// ====== 初期化 ======
window.addEventListener('DOMContentLoaded', function() {
  if (PORTAL_URL) document.getElementById('portalLink').style.display = '';

  // 部署管理リンク表示判定（管理者 or 部署承認者）
  google.script.run.withSuccessHandler(function(ok) {
    if (ok) document.getElementById('navDept').style.display = '';
  }).api_isDeptApprover();
  google.script.run.withSuccessHandler(function(ok) {
    if (ok) document.getElementById('navDept').style.display = '';
  }).api_isAdmin();

  // 総務管理リンク表示判定
  google.script.run.withSuccessHandler(function(ok) {
    if (ok) document.getElementById('navSomu').style.display = '';
  }).api_isSomu();

  // 部署一覧ロード
  google.script.run.withSuccessHandler(function(depts) {
    var sel = document.getElementById('deptSelect');
    sel.innerHTML = '<option value="">-- 部署を選択 --</option>';
    depts.forEach(function(d) {
      var opt = document.createElement('option');
      opt.value = d.deptId;
      opt.textContent = d.deptName;
      opt.dataset.name = d.deptName;
      sel.appendChild(opt);
    });

    // ログインユーザーの部署を自動選択
    google.script.run.withSuccessHandler(function(info) {
      if (info) {
        sel.value = info.deptId;
        selectedDeptId = info.deptId;
        selectedDeptName = info.deptName;
        loadWorkers(info.deptId, info.workerId);
      } else {
        // 自動検出できなかった場合も予定一覧を表示

  // 承認待ち一覧ロード

  // LOOKUPデータロード

  // 勤務日一覧ロード

});

// ====== 休暇予定一覧 ======
function loadLeaveTable() {
  var wrap = document.getElementById('leaveTableWrap');
  wrap.innerHTML = '<div class="loading">読み込み中...</div>';
  google.script.run.withSuccessHandler(function(items) {
    if (!items) items = [];

    // 本日の日付文字列（yyyy/MM/dd）
    var now = new Date();
    var todayStr = now.getFullYear() + '/' + ('0'+(now.getMonth()+1)).slice(-2) + '/' + ('0'+now.getDate()).slice(-2);

    // 本日と今後に分離
    var todayItems = [];
    var futureItems = [];
    items.forEach(function(it) {
      if (it.leaveDate === todayStr) todayItems.push(it);
      else futureItems.push(it);
    });

    // 本日セクション
    var todayCard = document.getElementById('todaySectionCard');
    var todayWrap = document.getElementById('todayLeaveWrap');
    if (todayItems.length > 0) {
      todayCard.style.display = '';
      document.getElementById('todayLeaveCount').textContent = todayItems.length + '名';
      var tHtml = '<table><thead><tr><th>部署</th><th>氏名</th><th>区分</th><th>種類</th><th>状態</th></tr></thead><tbody>';
      todayItems.forEach(function(it) {
        var statusClass = it.status === '承認済' ? 'ok' : 'info';
        tHtml += '<tr style="font-weight:700;">'
          + '<td>' + it.deptName + '</td>'
          + '<td>' + it.workerName + '</td>'
          + '<td>' + it.leaveKubun + (it.halfDayType ? '(' + it.halfDayType + ')' : '') + '</td>'
          + '<td>' + it.leaveType + '</td>'
          + '<td><span class="pill ' + statusClass + '">' + it.status + '</span></td>'
          + '</tr>';
      });
      tHtml += '</tbody></table>';
      todayWrap.innerHTML = tHtml;
    } else {
      todayCard.style.display = 'none';
    }

    // 今後セクション
    document.getElementById('leaveCount').textContent = futureItems.length + '件';
    if (!futureItems.length) {
      wrap.innerHTML = '<div class="loading">予定なし</div>';
      return;
    }
    // 編集モーダル用にデータをキャッシュ
    window.LEAVE_ITEMS = items;

    var html = '<table><thead><tr><th>日付</th><th>部署</th><th>氏名</th><th>区分</th><th>種類</th><th>状態</th><th>操作</th></tr></thead><tbody>';
    futureItems.forEach(function(it) {
      var statusClass = it.status === '承認済' ? 'ok' : 'info';
      var actionBtns = '';
      if (it.status !== '取消' && it.status !== '却下') {
        actionBtns = '<button class="ghost btn-sm" onclick="openEditLeaveModal(\'' + it.reqId + '\')" style="font-size:11px;">編集</button>'
          + ' <button class="ghost btn-sm" onclick="confirmDeleteLeave(\'' + it.reqId + '\')" style="font-size:11px;color:var(--danger);">削除</button>';
      }
      if (it.status === '申請中') {
        actionBtns += ' <a href="' + APP_URL + '?page=preview&reqId=' + it.reqId + '" target="_top" class="btn-sm btn-blue" style="color:#fff;text-decoration:none;padding:4px 10px;border-radius:8px;">承認</a>';
      }
      html += '<tr>'
        + '<td>' + it.leaveDate + '</td>'
        + '<td>' + it.deptName + '</td>'
        + '<td>' + it.workerName + '</td>'
        + '<td>' + it.leaveKubun + (it.halfDayType ? '(' + it.halfDayType + ')' : '') + '</td>'
        + '<td>' + it.leaveType + '</td>'
        + '<td><span class="pill ' + statusClass + '">' + it.status + '</span></td>'
        + '<td>' + actionBtns + '</td>'
        + '</tr>';
    });
    html += '</tbody></table>';
    wrap.innerHTML = html;
  }).withFailureHandler(function(err) {
    console.error('予定一覧取得エラー:', err);
    wrap.innerHTML = '<div class="loading">予定なし</div>';
    document.getElementById('leaveCount').textContent = '0件';
  }).api_getUpcomingLeaves(selectedDeptId, selectedWorkerId);
}

// ====== モーダル制御 ======
function openModal() {
  if (!selectedWorkerId) { alert('作業員を選択してください'); return; }
  resetModal();
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function resetModal() {
  currentStep = 1;
  document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
  document.querySelector('.step[data-step="1"]').classList.add('active');
  document.querySelectorAll('input[type="radio"]').forEach(function(r) { r.checked = false; });
  document.getElementById('leaveDate').selectedIndex = 0;
  document.getElementById('substituteDate').selectedIndex = 0;
  document.getElementById('specialReason').value = '';
  document.getElementById('paidDetail').value = '';
  // 過去申請カレンダーもリセット
  selectedRetroactiveLeaveDate = '';
  document.getElementById('retroSelectedInfo').textContent = '選択中: なし';
  var sec = document.getElementById('retroSection');
  if (sec) sec.classList.remove('open');
  var icon = document.getElementById('retroToggleIcon');
  if (icon) icon.innerHTML = '&#9654;';
  // 今日基準月で初期化
  var now = new Date();
  retroCalYear = now.getFullYear();
  retroCalMonth = now.getMonth() + 1;
  renderRetroCalendar();
}

// ====== 過去申請カレンダー ======
function toggleRetroSection() {
  var sec = document.getElementById('retroSection');
  var icon = document.getElementById('retroToggleIcon');
  if (sec.classList.contains('open')) {
    sec.classList.remove('open');
    icon.innerHTML = '&#9654;';
  } else {
    sec.classList.add('open');
    icon.innerHTML = '&#9660;';
    // 開いた時に最新で再描画
    if (!retroCalYear) {
      var now = new Date();
      retroCalYear = now.getFullYear();
      retroCalMonth = now.getMonth() + 1;
    }
    renderRetroCalendar();
  }
}

function changeRetroMonth(delta) {
  var m = retroCalMonth + delta;
  var y = retroCalYear;
  if (m < 1) { m = 12; y--; }
  if (m > 12) { m = 1; y++; }
  // 範囲外のチェック
  var firstOfMonth = new Date(y, m - 1, 1);
  var lastOfMonth = new Date(y, m, 0);
  var today = new Date();
  today.setHours(0,0,0,0);
  // 月全体が許容範囲外なら切替不可
  if (lastOfMonth < RETRO_MIN_DATE) return;
  if (firstOfMonth > today) return;
  retroCalYear = y;
  retroCalMonth = m;
  renderRetroCalendar();
}

function renderRetroCalendar() {
  var title = document.getElementById('retroCalTitle');
  var grid = document.getElementById('retroCalGrid');
  if (!title || !grid) return;
  title.textContent = retroCalYear + '年 ' + retroCalMonth + '月';

  // 前後ボタンの活性制御
  var prevFirst = new Date(retroCalYear, retroCalMonth - 2, 1);
  var prevLast = new Date(retroCalYear, retroCalMonth - 1, 0);
  document.getElementById('retroPrevBtn').disabled = (prevLast < RETRO_MIN_DATE);
  var nextFirst = new Date(retroCalYear, retroCalMonth, 1);
  var today = new Date(); today.setHours(0,0,0,0);
  document.getElementById('retroNextBtn').disabled = (nextFirst > today);

  // ヘッダー（曜日）
  var html = '';
  var dows = ['日','月','火','水','木','金','土'];
  for (var i = 0; i < 7; i++) {
    var cls = 'dow';
    if (i === 0) cls += ' sun';
    if (i === 6) cls += ' sat';
    html += '<div class="' + cls + '">' + dows[i] + '</div>';
  }
  grid.innerHTML = html + '<div class="retro-cal-loading" style="grid-column:span 7;text-align:center;padding:14px;color:var(--muted);font-size:12px;">読込中...</div>';

  // バックエンドから勤務日取得（'yyyy-MM' 文字列で渡す）
  var ym = retroCalYear + '-' + ('0' + retroCalMonth).slice(-2);
  if (retroWorkingDaysCache[ym]) {
    drawRetroCalendarCells(retroWorkingDaysCache[ym]);
    return;
  }
  google.script.run
    .withSuccessHandler(function(days) {
      // days = [{date:'yyyy-MM-dd', dow, label}, ...]
      var list = (days || []).map(function(d) { return d.date; });
      retroWorkingDaysCache[ym] = list;
      // 描画前に月が切り替わっていたら無視
      var currentYm = retroCalYear + '-' + ('0' + retroCalMonth).slice(-2);
      if (currentYm !== ym) return;
      drawRetroCalendarCells(list);
    })
    .withFailureHandler(function(err) {
      console.error('過去勤務日取得エラー:', err);
      drawRetroCalendarCells([]);
    })
    .api_getPastWorkingDays(ym);
}

function drawRetroCalendarCells(workableList) {
  var grid = document.getElementById('retroCalGrid');
  var html = '';
  var dows = ['日','月','火','水','木','金','土'];
  for (var i = 0; i < 7; i++) {
    var cls = 'dow';
    if (i === 0) cls += ' sun';
    if (i === 6) cls += ' sat';
    html += '<div class="' + cls + '">' + dows[i] + '</div>';
  }

  var firstDay = new Date(retroCalYear, retroCalMonth - 1, 1);
  var startDow = firstDay.getDay();
  var lastDate = new Date(retroCalYear, retroCalMonth, 0).getDate();
  var today = new Date(); today.setHours(0,0,0,0);

  // 先頭の空セル
  for (var s = 0; s < startDow; s++) {
    html += '<div class="retro-cal-cell empty"></div>';
  }
  for (var d = 1; d <= lastDate; d++) {
    var dt = new Date(retroCalYear, retroCalMonth - 1, d);
    var iso = retroCalYear + '-' + ('0' + retroCalMonth).slice(-2) + '-' + ('0' + d).slice(-2);
    var slash = isoToSlash_(iso);
    var inRange = (dt >= RETRO_MIN_DATE && dt <= today);
    var isWorkable = inRange && workableList.indexOf(iso) >= 0;
    var cls = 'retro-cal-cell';
    if (!isWorkable) cls += ' disabled';
    else cls += ' workable';
    // 内部保持は ISO 形式のため ISO で比較
    if (selectedRetroactiveLeaveDate === iso) cls += ' selected';
    if (isWorkable) {
      // data-date には ISO 形式を格納し、onclick にも ISO を渡す（表示はスラッシュ）
      html += '<div class="' + cls + '" data-date="' + iso + '" onclick="selectRetroDate(\'' + iso + '\')">' + d + '</div>';
    } else {
      html += '<div class="' + cls + '">' + d + '</div>';
    }
  }
  grid.innerHTML = html;
}

function selectRetroDate(isoDate) {
  // 内部保持は ISO 形式（'yyyy-MM-dd'）、表示はスラッシュ形式
  selectedRetroactiveLeaveDate = isoDate;
  var slashDate = isoToSlash_(isoDate);
  // 通常プルダウンの選択をクリア（排他）
  var ld = document.getElementById('leaveDate');
  if (ld) ld.selectedIndex = 0;
  document.getElementById('retroSelectedInfo').textContent = '選択中: ' + slashDate + '（過去申請）';
  // セルのselected再描画
  var cells = document.querySelectorAll('#retroCalGrid .retro-cal-cell');
  for (var i = 0; i < cells.length; i++) {
    cells[i].classList.remove('selected');
    if (cells[i].dataset && cells[i].dataset.date === isoDate) {
      cells[i].classList.add('selected');
    }
  }
}

function showStep(n) {
  document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
  var target = document.querySelector('.step[data-step="' + n + '"]');
  if (target) target.classList.add('active');
  currentStep = n;
}

function nextStep(n) {
  // バリデーション
  if (currentStep === 1) {
    var kubun = document.querySelector('input[name="leaveKubun"]:checked');
    if (!kubun) { alert('休暇区分を選択してください'); return; }
  }
  if (currentStep === 2) {
    var hasNormal = !!document.getElementById('leaveDate').value;
    var hasRetro = !!selectedRetroactiveLeaveDate;
    if (!hasNormal && !hasRetro) { alert('休暇日を選択してください（過去申請カレンダーから選択することもできます）'); return; }
    var kubunVal = document.querySelector('input[name="leaveKubun"]:checked').value;
    if (kubunVal === '全日休') {
      // 半日区分スキップ → Step4へ
      buildLeaveTypeOptions(kubunVal);
      showStep(4);
      return;
    }
  }
  if (currentStep === 3) {
    var halfDay = document.querySelector('input[name="halfDayType"]:checked');
    if (!halfDay) { alert('午前・午後を選択してください'); return; }
    var kubunVal2 = document.querySelector('input[name="leaveKubun"]:checked').value;
    buildLeaveTypeOptions(kubunVal2);
  }
  if (currentStep === 9) return; // 確認画面の先はない

  // Step9: 確認画面を構築
  if (n === 9) {
    buildConfirmation();
  }

  showStep(n);
}

function prevStep(n) {
  showStep(n);
}

function prevStepFromType() {
  var kubun = document.querySelector('input[name="leaveKubun"]:checked').value;
  if (kubun === '全日休') {
    showStep(2);
  } else {
    showStep(3);
  }
}

function nextStepFromType() {
  var type = document.querySelector('input[name="leaveType"]:checked');
  if (!type) { alert('休暇種類を選択してください'); return; }
  var typeVal = type.value;
  if (typeVal === '振替休暇') { showStep(5); }
  else if (typeVal === '特別休暇') { showStep(6); }
  else if (typeVal === '有給消化（私用）') { showStep(7); }
  else { showStep(9); buildConfirmation(); }
}

function prevStepFromConfirm() {
  var type = document.querySelector('input[name="leaveType"]:checked');
  if (!type) { showStep(4); return; }
  var typeVal = type.value;
  if (typeVal === '振替休暇') { showStep(5); }
  else if (typeVal === '特別休暇') { showStep(6); }
  else if (typeVal === '有給消化（私用）') { showStep(7); }
  else { showStep(4); }
}

function buildLeaveTypeOptions(kubun) {
  var group = document.getElementById('leaveTypeGroup');
  group.innerHTML = '';
  var types = kubun === '全日休'
    ? ['有給消化（私用）', '振替休暇', '特別休暇']
    : ['有給消化（私用）', '特別休暇'];

  types.forEach(function(t) {
    var lbl = document.createElement('label');
    lbl.innerHTML = '<input type="radio" name="leaveType" value="' + t + '"><span>' + t + '</span>';
    group.appendChild(lbl);
  });
}

function buildConfirmation() {
  var kubun = document.querySelector('input[name="leaveKubun"]:checked');
  var halfDay = document.querySelector('input[name="halfDayType"]:checked');
  var leaveType = document.querySelector('input[name="leaveType"]:checked');

  document.getElementById('cfmDept').textContent = selectedDeptName;
  document.getElementById('cfmWorker').textContent = selectedWorkerId + ' ' + selectedWorkerName;
  document.getElementById('cfmKubun').textContent = kubun ? kubun.value : '';
  document.getElementById('cfmHalfDay').textContent = halfDay ? halfDay.value : '-';
  // 内部保持は ISO 形式のため、確認画面表示用にスラッシュ形式へ整形
  var displayDate = selectedRetroactiveLeaveDate
    ? isoToSlash_(selectedRetroactiveLeaveDate) + '（過去申請）'
    : document.getElementById('leaveDate').value;
  document.getElementById('cfmDate').textContent = displayDate;
  document.getElementById('cfmType').textContent = leaveType ? leaveType.value : '';
  document.getElementById('cfmSubDate').textContent = document.getElementById('substituteDate').value || '-';

  // 理由を統合表示
  var reason = '-';
  var typeVal = leaveType ? leaveType.value : '';
  if (typeVal === '特別休暇') {
    reason = document.getElementById('specialReason').value || '-';
  } else if (typeVal === '有給消化（私用）') {
    reason = document.getElementById('paidDetail').value || '私用のため';
  } else if (typeVal === '振替休暇') {
    reason = '振替休暇';
  }
  document.getElementById('cfmReason').textContent = reason;
}

function submitRequest() {
  var btn = document.getElementById('submitBtn');

  var kubun = document.querySelector('input[name="leaveKubun"]:checked');
  var halfDay = document.querySelector('input[name="halfDayType"]:checked');
  var leaveType = document.querySelector('input[name="leaveType"]:checked');

  // 過去申請かどうか判定
  var isRetro = !!selectedRetroactiveLeaveDate;
  var effectiveLeaveDate = isRetro
    ? selectedRetroactiveLeaveDate
    : document.getElementById('leaveDate').value;

  if (isRetro) {
    // 表示はスラッシュ形式、送信はそのまま ISO 形式
    if (!confirm('過去申請として送信します。\n対象日: ' + isoToSlash_(selectedRetroactiveLeaveDate) + '\n\n承認者および総務にすでにご連絡済みですか？\nよろしければ「OK」を押してください。')) {
      return;
    }
  }

  btn.disabled = true;
  btn.textContent = '送信中...';

  var data = {
    deptId: selectedDeptId,
    deptName: selectedDeptName,
    workerId: selectedWorkerId,
    workerName: selectedWorkerName,
    leaveKubun: kubun ? kubun.value : '',
    halfDayType: halfDay ? halfDay.value : '',
    leaveDate: effectiveLeaveDate,
    leaveType: leaveType ? leaveType.value : '',
    substituteDate: document.getElementById('substituteDate').value,
    specialReason: document.getElementById('specialReason').value,
    paidDetail: document.getElementById('paidDetail').value,
    isRetroactive: isRetro,
  };

  google.script.run
    .withSuccessHandler(function(result) {
      if (result && result.ok) {
        var previewUrl = APP_URL + '?page=preview&reqId=' + result.reqId;
        // モーダル内に申請完了メッセージとプレビューリンクを表示
        document.querySelector('.step.active').innerHTML =
          '<div style="text-align:center;padding:20px 0;">'
          + '<div style="font-size:40px;margin-bottom:12px;">&#10004;</div>'
          + '<div style="font-weight:900;font-size:18px;margin-bottom:8px;">申請が完了しました</div>'
          + '<div style="color:var(--muted);font-size:13px;margin-bottom:20px;">REQ_ID: ' + result.reqId + '</div>'
          + '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">'
          + '<a href="' + previewUrl + '" target="_top" style="display:inline-block;padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,#0ea5e9,#38bdf8);color:#fff;font-weight:800;font-size:15px;text-decoration:none;box-shadow:0 10px 22px rgba(14,165,233,.20);">プレビュー画面へ（承認依頼）</a>'
          + '<a href="' + APP_URL + '?page=top" target="_top" style="display:inline-block;padding:14px 32px;border-radius:12px;background:#fff;color:var(--text);font-weight:800;font-size:15px;text-decoration:none;border:1px solid #d7e7f5;">TOPに戻る</a>'
          + '</div>'
          + '</div>';
      } else {
        var msg = (result && result.error) ? result.error : '申請に失敗しました。';
        alert('申請に失敗しました：\n' + msg);
        btn.disabled = false;
        btn.textContent = '申請する';
      }
    })
    .withFailureHandler(function(err) {
      alert('エラー: ' + err.message);
      btn.disabled = false;
      btn.textContent = '申請する';
    })
    .api_submitLeaveRequest(data);
}

// ====== 承認待ち一覧 ======
function loadPendingRequests() {
  var wrap = document.getElementById('pendingWrap');
  wrap.innerHTML = '<div class="loading">読み込み中...</div>';
  google.script.run
    .withSuccessHandler(function(items) {
      if (!items || !items.length) {
        document.getElementById('pendingCount').textContent = '0件';
        wrap.innerHTML = '<div class="loading">承認待ちの申請はありません</div>';
        return;
      }
      document.getElementById('pendingCount').textContent = items.length + '件';
      var dayNames = ['日','月','火','水','木','金','土'];
      var html = '<table><thead><tr><th>休暇日</th><th>部署</th><th>氏名</th><th>区分</th><th>種類</th><th>申請日時</th><th></th></tr></thead><tbody>';
      items.forEach(function(it) {
        // 曜日付き
        var dateDisp = it.leaveDate;
        if (it.leaveDate) {
          var parts = it.leaveDate.split('/');
          if (parts.length === 3) {
            var dt = new Date(Number(parts[0]), Number(parts[1]) - 1, Number(parts[2]));
            dateDisp = it.leaveDate + '(' + dayNames[dt.getDay()] + ')';
          }
        }
        // 過去申請バッジ
        var retroBadge = '';
        var rowStyle = '';
        if (it.isRetroactive === true) {
          retroBadge = ' <span style="display:inline-block;padding:2px 8px;border-radius:999px;background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;font-size:11px;font-weight:800;">&#128281; 過去申請</span>'
            + (typeof it.daysAgo === 'number' ? ' <span style="font-size:11px;color:var(--muted);">(' + it.daysAgo + '日前)</span>' : '');
          rowStyle = ' style="background:#fffbeb;"';
        }
        html += '<tr' + rowStyle + '>'
          + '<td>' + dateDisp + retroBadge + '</td>'
          + '<td>' + it.deptName + '</td>'
          + '<td style="font-weight:700;">' + it.workerName + '</td>'
          + '<td>' + it.leaveKubun + (it.halfDayType ? '(' + it.halfDayType + ')' : '') + '</td>'
          + '<td>' + it.leaveType + '</td>'
          + '<td style="font-size:12px;color:var(--muted);">' + (it.submittedAt || '') + '</td>'
          + '<td><a href="' + APP_URL + '?page=preview&reqId=' + it.reqId + '" target="_top" class="btn-sm btn-blue" style="color:#fff;text-decoration:none;padding:6px 14px;border-radius:8px;display:inline-block;">承認プレビュー</a></td>'
          + '</tr>';
      });
      html += '</tbody></table>';
      wrap.innerHTML = html;
    })
    .withFailureHandler(function(err) {
      console.error('承認待ち一覧取得エラー:', err);
      wrap.innerHTML = '<div class="loading">取得エラー</div>';
      document.getElementById('pendingCount').textContent = '';
    })
    .api_getAllPendingRequests();
}

// ====== 編集モーダル ======
var EDIT_LEAVE_CTX = {};

// 休暇区分ラジオ変更時に半日区分の表示切り替え
document.querySelectorAll('input[name="editLeaveKubun"]').forEach(function(r) {
  r.addEventListener('change', function() {
    document.getElementById('editHalfDayWrap').style.display =
      this.value === '半日休' ? '' : 'none';
  });
});

function openEditLeaveModal(reqId) {
  var item = null;
  (window.LEAVE_ITEMS || []).forEach(function(it) { if (it.reqId === reqId) item = it; });
  if (!item) { alert('申請データが見つかりません。画面を更新してください。'); return; }

  EDIT_LEAVE_CTX = { reqId: reqId, item: item };

  document.getElementById('editInfo').textContent = item.deptName + ' ／ ' + item.workerName;

  // 休暇日（yyyy/MM/dd → yyyy-MM-dd に変換）
  var dateVal = (item.leaveDate || '').replace(/\//g, '-');
  document.getElementById('editLeaveDate').value = dateVal;

  // 休暇区分
  document.querySelectorAll('input[name="editLeaveKubun"]').forEach(function(r) {
    r.checked = (r.value === item.leaveKubun);
  });

  // 半日区分
  document.getElementById('editHalfDayWrap').style.display =
    item.leaveKubun === '半日休' ? '' : 'none';
  document.querySelectorAll('input[name="editHalfDayType"]').forEach(function(r) {
    r.checked = (r.value === item.halfDayType);
  });

  var btn = document.getElementById('editSaveBtn');
  btn.disabled = false;
  btn.textContent = '保存';

  document.getElementById('editOverlay').classList.add('active');
}

function closeEditLeaveModal() {
  document.getElementById('editOverlay').classList.remove('active');
}

function saveEditLeave() {
  var leaveDate = document.getElementById('editLeaveDate').value;
  var kubunRadio = document.querySelector('input[name="editLeaveKubun"]:checked');
  var halfDayRadio = document.querySelector('input[name="editHalfDayType"]:checked');

  if (!leaveDate) { alert('休暇日を入力してください。'); return; }
  if (!kubunRadio) { alert('休暇区分を選択してください。'); return; }
  if (kubunRadio.value === '半日休' && !halfDayRadio) { alert('半日区分を選択してください。'); return; }

  var patch = {
    leaveDate: leaveDate,
    leaveKubun: kubunRadio.value,
    halfDayType: kubunRadio.value === '半日休' ? halfDayRadio.value : ''
  };

  var msg = '申請内容を変更しますか？\n休暇日: ' + leaveDate + '\n区分: ' + patch.leaveKubun;
  if (patch.halfDayType) msg += '(' + patch.halfDayType + ')';
  if (EDIT_LEAVE_CTX.item.status === '承認済') msg += '\n\n※ 承認済みのため、申請中に戻り再承認が必要になります。';
  if (!confirm(msg)) return;

  var btn = document.getElementById('editSaveBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  google.script.run
    .withSuccessHandler(function(res) {
      closeEditLeaveModal();
      if (res && res.ok) {
        alert('申請を更新しました。');
        loadLeaveTable();
        loadPendingRequests();
      } else {
        alert('更新に失敗しました。');
      }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false;
      btn.textContent = '保存';
      alert('エラー: ' + (err.message || err));
    })
    .api_editLeaveRequest(EDIT_LEAVE_CTX.reqId, patch);
}

function confirmDeleteLeave(reqId) {
  var item = null;
  (window.LEAVE_ITEMS || []).forEach(function(it) { if (it.reqId === reqId) item = it; });
  var label = item ? (item.workerName + ' の休暇届（' + item.leaveDate + '）') : '選択した申請';
  if (!confirm(label + 'を削除しますか？\n\nこの操作は取り消せません。')) return;

  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.ok) {
        alert('申請を削除しました。');
        loadLeaveTable();
        loadPendingRequests();
      } else {
        alert('削除に失敗しました。');
      }
    })
    .withFailureHandler(function(err) {
      alert('削除エラー: ' + (err.message || err));
    })
    .api_deleteLeaveRequest(reqId);
}
</script>
</body>
</html>
